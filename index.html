<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Test — firmy informatyczne</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, .86);
      --card: rgba(30, 41, 59, .92);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --strong: #f8fafc;
      --line: rgba(148, 163, 184, .24);
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --warn: #f59e0b;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(56, 189, 248, .18), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(34, 197, 94, .12), transparent 28rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.55rem);
      letter-spacing: -.035em;
      line-height: 1.05;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: .98rem;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .test-column {
      display: grid;
      gap: 12px;
    }

    .test-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .mode-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 10px;
      font-size: .92rem;
      font-weight: 750;
    }

    .mode-picker select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 34px 7px 10px;
      color: var(--strong);
      background:
        linear-gradient(45deg, transparent 50%, var(--accent) 50%) calc(100% - 18px) calc(50% - 3px) / 6px 6px no-repeat,
        linear-gradient(135deg, var(--accent) 50%, transparent 50%) calc(100% - 12px) calc(50% - 3px) / 6px 6px no-repeat,
        rgba(2, 6, 23, .45);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .header-actions { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .main-card {
      min-height: 500px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, .45);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .88rem;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--strong);
      font-weight: 700;
    }

    .content {
      padding: 24px;
    }

    .question-number {
      color: var(--accent);
      font-size: .9rem;
      font-weight: 750;
      margin-bottom: 10px;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(1.24rem, 2.5vw, 1.7rem);
      line-height: 1.28;
      letter-spacing: -.02em;
      color: var(--strong);
    }

    .hint {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.55;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    button, .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      color: #07111f;
      background: var(--accent);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: var(--text);
      background: rgba(148, 163, 184, .12);
      border: 1px solid var(--line);
    }

    button.good {
      background: var(--accent-2);
      color: #04130a;
    }

    button.bad {
      background: var(--danger);
      color: #21040a;
    }

    button.warn {
      background: var(--warn);
      color: #1f1300;
    }

    button.ghost {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }

    button.full {
      width: 100%;
      text-align: left;
      color: var(--text);
      background: rgba(15, 23, 42, .5);
      border: 1px solid var(--line);
      line-height: 1.4;
      font-weight: 650;
    }

    button.full:hover {
      border-color: rgba(56, 189, 248, .65);
      background: rgba(56, 189, 248, .10);
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-right: 9px;
      border-radius: 10px;
      background: rgba(56, 189, 248, .16);
      color: #7dd3fc;
      font-weight: 850;
      text-transform: uppercase;
      vertical-align: top;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, .55);
      line-height: 1.55;
    }

    .feedback.good-border {
      border-color: rgba(34, 197, 94, .45);
    }

    .feedback.bad-border {
      border-color: rgba(251, 113, 133, .50);
    }

    .definition {
      white-space: pre-wrap;
      background: rgba(2, 6, 23, .45);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin: 16px 0;
      line-height: 1.55;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 23, 42, .45);
      line-height: 1.45;
      cursor: pointer;
    }

    .choice-row input {
      margin-top: 4px;
      transform: scale(1.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    aside {
      display: grid;
      gap: 18px;
    }

    .side-card {
      padding: 18px;
    }

    .side-card h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      color: var(--strong);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .stat .num {
      display: block;
      font-size: 1.6rem;
      font-weight: 850;
      color: var(--strong);
      line-height: 1;
    }

    .stat .label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: .84rem;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .16);
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 8px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 750;
    }

    .mini-list {
      margin: 10px 0 0;
      padding-left: 19px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
      max-height: 260px;
      overflow: auto;
    }

    .mini-list li {
      margin: 7px 0;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    .done {
      text-align: center;
      padding: 42px 24px;
    }

    .done .emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .done h2 {
      margin: 0 0 10px;
      color: var(--strong);
      font-size: clamp(1.4rem, 3vw, 2.1rem);
    }

    .kbd {
      display: inline-flex;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 8px;
      padding: 1px 7px;
      color: var(--strong);
      background: rgba(15, 23, 42, .75);
      font-size: .84rem;
      font-weight: 750;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.45;
    }


    /* Mobile-first polish */
    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    button,
    select,
    input {
      font-size: 16px;
    }

    button,
    .choice-row,
    .mode-picker select,
    summary {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:focus-visible,
    .choice-row:focus-within,
    .mode-picker select:focus-visible {
      outline: 3px solid rgba(56, 189, 248, .45);
      outline-offset: 3px;
    }

    .question,
    .definition,
    .feedback,
    button.full,
    .choice-row,
    .mini-list {
      overflow-wrap: anywhere;
    }

    @media (hover: none) {
      button:hover {
        transform: none;
        filter: none;
      }
    }

    @media (max-width: 700px) {
      :root {
        --radius: 18px;
        --shadow: 0 16px 44px rgba(0,0,0,.28);
      }

      body {
        background:
          radial-gradient(circle at 0% 0%, rgba(56, 189, 248, .16), transparent 22rem),
          radial-gradient(circle at 100% 0%, rgba(34, 197, 94, .10), transparent 20rem),
          var(--bg);
      }

      .wrap {
        width: 100%;
        padding: 14px 10px calc(24px + env(safe-area-inset-bottom));
      }

      .test-column {
        gap: 10px;
      }

      .test-controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px;
        border-radius: 17px;
      }

      .mode-picker {
        width: 100%;
        justify-content: space-between;
        padding: 10px;
        border-radius: 15px;
      }

      .mode-picker select {
        min-height: 44px;
        flex: 1;
        max-width: 190px;
      }

      #resetBtn {
        width: 100%;
        min-height: 46px;
        text-align: center;
      }

      .grid {
        gap: 12px;
      }

      .card {
        border-radius: var(--radius);
      }

      .main-card {
        min-height: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
      }

      .pill {
        justify-content: center;
        padding: 8px 9px;
        font-size: .82rem;
      }

      .pill:last-child {
        grid-column: 1 / -1;
      }

      .content {
        padding: 16px 12px;
      }

      .question-number {
        font-size: .84rem;
        margin-bottom: 8px;
      }

      .question {
        margin-bottom: 14px;
        font-size: clamp(1.08rem, 5.2vw, 1.34rem);
        line-height: 1.32;
      }

      .hint {
        margin-bottom: 14px;
        font-size: .94rem;
        line-height: 1.45;
      }

      .answers {
        gap: 9px;
        margin: 14px 0;
      }

      button,
      .btn {
        min-height: 48px;
        border-radius: 15px;
        padding: 13px 14px;
      }

      button.full {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 12px;
        line-height: 1.35;
      }

      button.full .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .letter {
        width: 30px;
        height: 30px;
        margin-right: 7px;
        border-radius: 11px;
      }

      .choice-row {
        gap: 12px;
        padding: 14px 12px;
        border-radius: 15px;
      }

      .choice-row > span {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .choice-row .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .choice-row input {
        width: 22px;
        height: 22px;
        margin-top: 4px;
        transform: none;
        flex: 0 0 auto;
      }

      .feedback,
      .definition {
        padding: 14px;
        border-radius: 16px;
        font-size: .95rem;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .actions button {
        width: 100%;
        text-align: center;
      }

      #feedback .actions,
      #openAnswer .actions:last-child,
      .done > button,
      .done .actions {
        position: sticky;
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 5;
        padding: 8px;
        margin: 14px -8px -8px;
        border: 1px solid var(--line);
        border-radius: 17px;
        background: rgba(15, 23, 42, .88);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(0,0,0,.30);
      }

      .side-card {
        padding: 14px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }

      .stat {
        padding: 10px 7px;
        border-radius: 14px;
        text-align: center;
      }

      .stat .num {
        font-size: 1.22rem;
      }

      .stat .label {
        font-size: .72rem;
        line-height: 1.15;
      }

      .mini-list {
        max-height: 170px;
        font-size: .86rem;
      }

      details:not([open]) {
        margin-top: 10px;
      }

      summary {
        min-height: 38px;
        display: flex;
        align-items: center;
      }

      .done {
        padding: 28px 10px;
      }

      .done .emoji {
        font-size: 2.4rem;
      }
    }

    @media (max-width: 380px) {
      .wrap {
        padding-left: 8px;
        padding-right: 8px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .pill:last-child {
        grid-column: auto;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .mode-picker {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .mode-picker select {
        max-width: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="test-column">
        <main class="card main-card">
        <div class="topbar">
          <div class="pill">Baza <strong id="bankName">Oficjalne</strong></div>
          <div class="pill">Runda <strong id="round">1</strong></div>
          <div class="pill">Pytanie <strong id="position">1/1</strong></div>
          <div class="pill">Tryb <strong id="mode">—</strong></div>
        </div>
        <div class="content" id="app"></div>
        </main>

        <div class="test-controls" aria-label="Ustawienia testu">
          <label class="mode-picker" for="questionBank">
            Baza
            <select id="questionBank" aria-label="Baza pytań">
              <option value="official">Oficjalne</option>
              <option value="presentation">Na podstawie prezentacji</option>
            </select>
          </label>
          <label class="mode-picker" for="filterMode">
            Pytania
            <select id="filterMode" aria-label="Tryb pytań">
              <option value="all">wszystkie</option>
              <option value="closed">zamknięte</option>
              <option value="open">otwarte</option>
            </select>
          </label>
          <button class="secondary" id="resetBtn" type="button">Reset testu</button>
        </div>
      </div>

      <aside>
        <section class="card side-card">
          <h2>Postęp</h2>
          <div class="stats">
            <div class="stat"><span class="num" id="masteredCount">0</span><span class="label">Umiem</span></div>
            <div class="stat"><span class="num" id="reviewCount">0</span><span class="label">Do powtórki</span></div>
            <div class="stat"><span class="num" id="leftCount">0</span><span class="label">W tej rundzie</span></div>
            <div class="stat"><span class="num" id="totalCount">0</span><span class="label">Wszystkich</span></div>
          </div>
          <div class="progress"><div id="progressBar"></div></div>
          <div class="footer-note">Postęp zapisuje się lokalnie osobno dla każdej bazy pytań. Reset usuwa zapis aktywnej bazy i tasuje test od nowa.</div>
        </section>

        <section class="card side-card">
          <h2>Kupki</h2>
          <details open>
            <summary>Do powtórki</summary>
            <ol class="mini-list" id="reviewList"></ol>
          </details>
          <details>
            <summary>Umiem</summary>
            <ol class="mini-list" id="masteredList"></ol>
          </details>
        </section>
      </aside>
    </div>

    }

    function questionsForBank(bank) {
      const found = QUESTION_BANKS.find(item => item.key === normalizeBank(bank));
      return found ? found.questions : [];
    }

    function bankLabel(bank = activeBank) {
      const found = QUESTION_BANKS.find(item => item.key === normalizeBank(bank));
      return found ? found.label : '—';
    }

    function storageKey(bank = activeBank) {
      return STORAGE_PREFIX + normalizeBank(bank);
    }

    function setActiveBank(bank) {
      activeBank = normalizeBank(bank);
      QUESTIONS = questionsForBank(activeBank);
      byId = new Map(QUESTIONS.map(q => [q.id, q]));
      localStorage.setItem(ACTIVE_BANK_KEY, activeBank);
    }

    function normalizeMode(mode) {
      return Object.prototype.hasOwnProperty.call(TEST_MODES, mode) ? mode : DEFAULT_MODE;
    }

    function questionsForMode(mode) {
      const normalized = normalizeMode(mode);
      if (normalized === 'all') return QUESTIONS;
      return QUESTIONS.filter(q => q.type === normalized);
    }

    function questionIdsForMode(mode) {
      return questionsForMode(mode).map(q => q.id);
    }

    function modeLabel(mode) {
      return TEST_MODES[normalizeMode(mode)];
    }

    function syncModeSelect() {
      const selector = document.getElementById('filterMode');
      if (selector) selector.value = normalizeMode(state.filterMode);
    }

    function syncBankSelect() {
      const selector = document.getElementById('questionBank');
      if (selector) selector.value = activeBank;
    }

    function newState(filterMode = DEFAULT_MODE) {
      const normalizedMode = normalizeMode(filterMode);
      const ids = questionIdsForMode(normalizedMode);
      return {
        filterMode: normalizedMode,
        queue: shuffle(ids),
        index: 0,
        mastered: [],
        review: [],
        roundWrong: [],
        round: 1,
        answeredCurrent: false,
        lastFeedback: null
      };
    }

    function loadState(bank = activeBank) {
      try {
        const key = storageKey(bank);
        let raw = localStorage.getItem(key);
        if (!raw && normalizeBank(bank) === 'official') {
          raw = localStorage.getItem(LEGACY_STORAGE_KEY);
        }
        if (!raw) return newState();

        const saved = JSON.parse(raw);
        const normalizedMode = normalizeMode(saved.filterMode);
        const validIds = new Set(questionIdsForMode(normalizedMode));
        const queue = Array.isArray(saved.queue) ? saved.queue.filter(id => validIds.has(id)) : [];
        const mastered = Array.isArray(saved.mastered) ? saved.mastered.filter(id => validIds.has(id)) : [];
        const review = Array.isArray(saved.review) ? saved.review.filter(id => validIds.has(id)) : [];
        const roundWrong = Array.isArray(saved.roundWrong) ? saved.roundWrong.filter(id => validIds.has(id)) : [];

        if (!queue.length) return newState(normalizedMode);

        return {
          filterMode: normalizedMode,
          queue,
          index: Math.min(Number(saved.index) || 0, queue.length),
          mastered,
          review,
          roundWrong,
          round: Math.max(1, Number(saved.round) || 1),
          answeredCurrent: false,
          lastFeedback: null
        };
      } catch (error) {
        return newState();
      }
    }

    function saveState() {
      localStorage.setItem(storageKey(activeBank), JSON.stringify(state));
    }

    function resetTest() {
      const currentMode = normalizeMode(state.filterMode);
      localStorage.removeItem(storageKey(activeBank));
      if (activeBank === 'official') localStorage.removeItem(LEGACY_STORAGE_KEY);
      state = newState(currentMode);
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeQuestionBank(nextBank) {
      if (normalizeBank(nextBank) === activeBank) return;
      saveState();
      setActiveBank(nextBank);
      state = loadState(activeBank);
      syncBankSelect();
      syncModeSelect();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changeMode(nextMode) {
      const previousMode = normalizeMode(state.filterMode);
      const normalizedNextMode = normalizeMode(nextMode);
      if (previousMode === normalizedNextMode) return;

      const ok = confirm('Zmiana typu pytań rozpocznie osobny test dla wybranego filtra. Obecny postęp w tej bazie zostanie zachowany tylko dla aktualnego widoku. Kontynuować?');
      if (!ok) {
        syncModeSelect();
        return;
      }

      state = newState(normalizedNextMode);
      saveState();
      render();
    }

    function currentQuestion() {
      return byId.get(state.queue[state.index]);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function optionLabel(option) {
      return '<span class="letter">' + escapeHtml(option.key) + '</span>' + escapeHtml(option.text);
    }

    function render() {
      const app = document.getElementById('app');
      syncBankSelect();
      syncModeSelect();
      document.getElementById('bankName').textContent = bankLabel(activeBank);

      if (state.index >= state.queue.length) {
        renderRoundEnd();
        return;
      }

      const q = currentQuestion();
      document.getElementById('round').textContent = state.round;
      document.getElementById('position').textContent = `${state.index + 1}/${state.queue.length}`;
      document.getElementById('mode').textContent = modeLabel(state.filterMode);
      updateStats();

      if (!q) {
        app.innerHTML = '<p class="empty">Nie znaleziono pytania. Zresetuj test dla tej bazy.</p>';
        return;
      }

      if (q.type === 'open') renderOpenQuestion(q);
      else renderClosedQuestion(q);
    }

    function renderQuestionHeader(q) {
      return `
        <div class="question-number">Pytanie #${escapeHtml(q.id)} · ${escapeHtml(bankLabel(activeBank))}</div>
        <h2 class="question">${escapeHtml(q.question)}</h2>
      `;
    }

    function renderClosedQuestion(q) {
      const app = document.getElementById('app');
      const shuffledOptions = shuffle(q.options);
      const isMulti = q.correct.length > 1;

      if (isMulti) {
        app.innerHTML = renderQuestionHeader(q) + `
          <p class="hint">To pytanie ma więcej niż jedną poprawną odpowiedź. Zaznacz wszystkie poprawne opcje i kliknij „Sprawdź”.</p>
          <div class="answers">
            ${shuffledOptions.map(o => `
              <label class="choice-row">
                <input type="checkbox" name="multi" value="${escapeHtml(o.key)}">
                <span>${optionLabel(o)}</span>
              </label>
            `).join('')}
          </div>
          <div class="actions">
            <button type="button" id="checkMulti">Sprawdź</button>
          </div>
          <div id="feedback"></div>
        `;

        document.getElementById('checkMulti').addEventListener('click', () => {
          const picked = [...document.querySelectorAll('input[name="multi"]:checked')].map(el => el.value).sort();
          const correct = [...q.correct].sort();
          const ok = picked.length === correct.length && picked.every((v, i) => v === correct[i]);
          showClosedFeedback(q, ok, picked);
        });
        return;
      }

      app.innerHTML = renderQuestionHeader(q) + `
        <div class="answers">
          ${shuffledOptions.map(o => `
            <button class="full" type="button" data-answer="${escapeHtml(o.key)}">${optionLabel(o)}</button>
          `).join('')}
        </div>
        <div id="feedback"></div>
      `;

      document.querySelectorAll('[data-answer]').forEach(btn => {
        btn.addEventListener('click', () => {
          const picked = btn.getAttribute('data-answer');
          const ok = q.correct.includes(picked);
          showClosedFeedback(q, ok, [picked]);
        });
      });
    }

    function showClosedFeedback(q, ok, picked) {
      if (state.answeredCurrent) return;
      state.answeredCurrent = true;
      classifyAnswer(q.id, ok);

      const correctText = q.correct
        .map(key => q.options.find(o => o.key === key))
        .filter(Boolean)
        .map(o => `<div>${optionLabel(o)}</div>`)
        .join('');

      const pickedText = picked.length ? picked.map(k => k.toUpperCase()).join(', ') : 'brak';
      const box = document.getElementById('feedback');
      box.innerHTML = `
        <div class="feedback ${ok ? 'good-border' : 'bad-border'}">
          <strong>${ok ? 'Dobrze ✅' : 'Źle ❌'}</strong>
          <div style="margin-top:8px">Twoja odpowiedź: <strong>${escapeHtml(pickedText)}</strong></div>
          <div style="margin-top:8px">Poprawna odpowiedź:</div>
          <div class="definition">${correctText || escapeHtml(q.answer)}</div>
          <div class="actions">
            <button type="button" id="nextQuestion">Następne pytanie</button>
          </div>
        </div>
      `;

      document.querySelectorAll('[data-answer], #checkMulti').forEach(el => el.disabled = true);
      document.getElementById('nextQuestion').addEventListener('click', nextQuestion);
      updateStats();
      saveState();
    }

    function renderOpenQuestion(q) {
      const app = document.getElementById('app');
      app.innerHTML = renderQuestionHeader(q) + `
        <p class="hint">Spróbuj odpowiedzieć samodzielnie. Potem odkryj definicję i oceń, czy umiesz.</p>
        <div class="actions">
          <button type="button" id="showAnswer">Pokaż odpowiedź / definicję</button>
        </div>
        <div id="openAnswer"></div>
      `;

      document.getElementById('showAnswer').addEventListener('click', () => {
        document.getElementById('openAnswer').innerHTML = `
          <div class="definition">${escapeHtml(q.answer)}</div>
          <div class="actions">
            <button type="button" class="bad" id="dontKnow">Nie umiem</button>
            <button type="button" class="good" id="know">Umiem</button>
          </div>
        `;
        document.getElementById('showAnswer').disabled = true;
        document.getElementById('dontKnow').addEventListener('click', () => markOpen(q.id, false));
        document.getElementById('know').addEventListener('click', () => markOpen(q.id, true));
      });
    }

    function markOpen(id, ok) {
      if (state.answeredCurrent) return;
      state.answeredCurrent = true;
      classifyAnswer(id, ok);

      const box = document.getElementById('openAnswer');
      box.insertAdjacentHTML('beforeend', `
        <div class="feedback ${ok ? 'good-border' : 'bad-border'}">
          <strong>${ok ? 'Oznaczone jako „Umiem” ✅' : 'Oznaczone jako „Nie umiem” ❌'}</strong>
          <div class="actions">
            <button type="button" id="nextQuestion">Następne pytanie</button>
          </div>
        </div>
      `);
      document.getElementById('dontKnow').disabled = true;
      document.getElementById('know').disabled = true;
      document.getElementById('nextQuestion').addEventListener('click', nextQuestion);
      updateStats();
      saveState();
    }

    function classifyAnswer(id, ok) {
      const mastered = new Set(state.mastered);
      const review = new Set(state.review);
      const roundWrong = new Set(state.roundWrong);

      if (ok) {
        mastered.add(id);
        review.delete(id);
        roundWrong.delete(id);
      } else {
        review.add(id);
        mastered.delete(id);
        roundWrong.add(id);
      }

      state.mastered = [...mastered];
      state.review = [...review];
      state.roundWrong = [...roundWrong];
    }

    function nextQuestion() {
      state.index += 1;
      state.answeredCurrent = false;
      state.lastFeedback = null;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderRoundEnd() {
      const app = document.getElementById('app');
      document.getElementById('bankName').textContent = bankLabel(activeBank);
      document.getElementById('round').textContent = state.round;
      document.getElementById('position').textContent = `${state.queue.length}/${state.queue.length}`;
      document.getElementById('mode').textContent = modeLabel(state.filterMode);

      if (state.roundWrong.length > 0) {
        app.innerHTML = `
          <div class="done">
            <div class="emoji">🔁</div>
            <h2>Koniec rundy ${state.round}</h2>
            <p class="hint">W następnej rundzie pojawią się tylko pytania, na które odpowiedź była błędna albo oznaczona jako „Nie umiem”.</p>
            <div class="stats" style="max-width:440px;margin:20px auto">
              <div class="stat"><span class="num">${state.queue.length - state.roundWrong.length}</span><span class="label">dobrze w rundzie</span></div>
              <div class="stat"><span class="num">${state.roundWrong.length}</span><span class="label">do powtórki</span></div>
            </div>
            <button type="button" id="nextRound">Start kolejnej rundy</button>
          </div>
        `;
        document.getElementById('nextRound').addEventListener('click', () => {
          state.round += 1;
          state.queue = shuffle(state.roundWrong);
          state.index = 0;
          state.roundWrong = [];
          state.answeredCurrent = false;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      } else {
        app.innerHTML = `
          <div class="done">
            <div class="emoji">🎉</div>
            <h2>Wszystko opanowane</h2>
            <p class="hint">Nie ma już pytań w kupce „Do powtórki”. Możesz zresetować test i przejść cały zestaw ponownie w nowej losowej kolejności.</p>
            <button type="button" id="restartAll">Zacznij od nowa</button>
          </div>
        `;
        document.getElementById('restartAll').addEventListener('click', () => {
          const currentMode = normalizeMode(state.filterMode);
          localStorage.removeItem(storageKey(activeBank));
          if (activeBank === 'official') localStorage.removeItem(LEGACY_STORAGE_KEY);
          state = newState(currentMode);
          saveState();
          render();
        });
      }

      updateStats();
      saveState();
    }

    function updateStats() {
      const validIds = new Set(questionIdsForMode(state.filterMode));
      const total = validIds.size;
      const mastered = new Set((state.mastered || []).filter(id => validIds.has(id)));
      const review = new Set((state.review || []).filter(id => validIds.has(id)));
      const left = Math.max(0, (state.queue || []).length - (state.index || 0));

      document.getElementById('masteredCount').textContent = mastered.size;
      document.getElementById('reviewCount').textContent = review.size;
      document.getElementById('leftCount').textContent = left;
      document.getElementById('totalCount').textContent = total;

      const answeredEver = new Set([...mastered, ...review]).size;
      const pct = total ? Math.round((answeredEver / total) * 100) : 0;
      document.getElementById('progressBar').style.width = pct + '%';

      renderMiniList('reviewList', [...review]);
      renderMiniList('masteredList', [...mastered]);
    }

    function renderMiniList(id, ids) {
      const target = document.getElementById(id);
      if (!target) return;

      if (!ids.length) {
        target.innerHTML = '<p class="empty">Pusto.</p>';
        return;
      }

      target.innerHTML = ids
        .sort((a, b) => a - b)
        .map(qid => {
          const q = byId.get(qid);
          const title = q ? q.question : 'Pytanie';
          return `<li>#${qid} — ${escapeHtml(title.length > 92 ? title.slice(0, 92) + '…' : title)}</li>`;
        })
        .join('');
    }

    document.getElementById('questionBank').addEventListener('change', event => changeQuestionBank(event.target.value));
    document.getElementById('filterMode').addEventListener('change', event => changeMode(event.target.value));
    document.getElementById('resetBtn').addEventListener('click', resetTest);
    document.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        const next = document.getElementById('nextQuestion');
        if (next) next.click();
      }
    });

    render();
  </script>
</body>
</html>
