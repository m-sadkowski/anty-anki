<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Test — BSK</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, .86);
      --card: rgba(30, 41, 59, .92);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --strong: #f8fafc;
      --line: rgba(148, 163, 184, .24);
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --warn: #f59e0b;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(56, 189, 248, .18), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(34, 197, 94, .12), transparent 28rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.55rem);
      letter-spacing: -.035em;
      line-height: 1.05;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: .98rem;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .test-column {
      display: grid;
      gap: 12px;
    }

    .test-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .mode-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 10px;
      font-size: .92rem;
      font-weight: 750;
    }

    .mode-picker select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 34px 7px 10px;
      color: var(--strong);
      background:
        linear-gradient(45deg, transparent 50%, var(--accent) 50%) calc(100% - 18px) calc(50% - 3px) / 6px 6px no-repeat,
        linear-gradient(135deg, var(--accent) 50%, transparent 50%) calc(100% - 12px) calc(50% - 3px) / 6px 6px no-repeat,
        rgba(2, 6, 23, .45);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .header-actions { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .main-card {
      min-height: 500px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, .45);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .88rem;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--strong);
      font-weight: 700;
    }

    .content {
      padding: 24px;
    }

    .question-number {
      color: var(--accent);
      font-size: .9rem;
      font-weight: 750;
      margin-bottom: 10px;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(1.24rem, 2.5vw, 1.7rem);
      line-height: 1.28;
      letter-spacing: -.02em;
      color: var(--strong);
    }

    .hint {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.55;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    button, .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      color: #07111f;
      background: var(--accent);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: var(--text);
      background: rgba(148, 163, 184, .12);
      border: 1px solid var(--line);
    }

    button.good {
      background: var(--accent-2);
      color: #04130a;
    }

    button.bad {
      background: var(--danger);
      color: #21040a;
    }

    button.warn {
      background: var(--warn);
      color: #1f1300;
    }

    button.ghost {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }

    button.full {
      width: 100%;
      text-align: left;
      color: var(--text);
      background: rgba(15, 23, 42, .5);
      border: 1px solid var(--line);
      line-height: 1.4;
      font-weight: 650;
    }

    button.full:hover {
      border-color: rgba(56, 189, 248, .65);
      background: rgba(56, 189, 248, .10);
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-right: 9px;
      border-radius: 10px;
      background: rgba(56, 189, 248, .16);
      color: #7dd3fc;
      font-weight: 850;
      text-transform: uppercase;
      vertical-align: top;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, .55);
      line-height: 1.55;
    }

    .feedback.good-border {
      border-color: rgba(34, 197, 94, .45);
    }

    .feedback.bad-border {
      border-color: rgba(251, 113, 133, .50);
    }

    .definition {
      white-space: pre-wrap;
      background: rgba(2, 6, 23, .45);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin: 16px 0;
      line-height: 1.55;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 23, 42, .45);
      line-height: 1.45;
      cursor: pointer;
    }

    .choice-row input {
      margin-top: 4px;
      transform: scale(1.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    aside {
      display: grid;
      gap: 18px;
    }

    .side-card {
      padding: 18px;
    }

    .side-card h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      color: var(--strong);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .stat .num {
      display: block;
      font-size: 1.6rem;
      font-weight: 850;
      color: var(--strong);
      line-height: 1;
    }

    .stat .label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: .84rem;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .16);
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 8px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 750;
    }

    .mini-list {
      margin: 10px 0 0;
      padding-left: 19px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
      max-height: 260px;
      overflow: auto;
    }

    .mini-list li {
      margin: 7px 0;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    .done {
      text-align: center;
      padding: 42px 24px;
    }

    .done .emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .done h2 {
      margin: 0 0 10px;
      color: var(--strong);
      font-size: clamp(1.4rem, 3vw, 2.1rem);
    }

    .kbd {
      display: inline-flex;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 8px;
      padding: 1px 7px;
      color: var(--strong);
      background: rgba(15, 23, 42, .75);
      font-size: .84rem;
      font-weight: 750;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.45;
    }


    /* Mobile-first polish */
    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    button,
    select,
    input {
      font-size: 16px;
    }

    button,
    .choice-row,
    .mode-picker select,
    summary {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:focus-visible,
    .choice-row:focus-within,
    .mode-picker select:focus-visible {
      outline: 3px solid rgba(56, 189, 248, .45);
      outline-offset: 3px;
    }

    .question,
    .definition,
    .feedback,
    button.full,
    .choice-row,
    .mini-list {
      overflow-wrap: anywhere;
    }

    @media (hover: none) {
      button:hover {
        transform: none;
        filter: none;
      }
    }

    @media (max-width: 700px) {
      :root {
        --radius: 18px;
        --shadow: 0 16px 44px rgba(0,0,0,.28);
      }

      body {
        background:
          radial-gradient(circle at 0% 0%, rgba(56, 189, 248, .16), transparent 22rem),
          radial-gradient(circle at 100% 0%, rgba(34, 197, 94, .10), transparent 20rem),
          var(--bg);
      }

      .wrap {
        width: 100%;
        padding: 14px 10px calc(24px + env(safe-area-inset-bottom));
      }

      .test-column {
        gap: 10px;
      }

      .test-controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px;
        border-radius: 17px;
      }

      .mode-picker {
        width: 100%;
        justify-content: space-between;
        padding: 10px;
        border-radius: 15px;
      }

      .mode-picker select {
        min-height: 44px;
        flex: 1;
        max-width: 190px;
      }

      #resetBtn {
        width: 100%;
        min-height: 46px;
        text-align: center;
      }

      .grid {
        gap: 12px;
      }

      .card {
        border-radius: var(--radius);
      }

      .main-card {
        min-height: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
      }

      .pill {
        justify-content: center;
        padding: 8px 9px;
        font-size: .82rem;
      }

      .pill:last-child {
        grid-column: 1 / -1;
      }

      .content {
        padding: 16px 12px;
      }

      .question-number {
        font-size: .84rem;
        margin-bottom: 8px;
      }

      .question {
        margin-bottom: 14px;
        font-size: clamp(1.08rem, 5.2vw, 1.34rem);
        line-height: 1.32;
      }

      .hint {
        margin-bottom: 14px;
        font-size: .94rem;
        line-height: 1.45;
      }

      .answers {
        gap: 9px;
        margin: 14px 0;
      }

      button,
      .btn {
        min-height: 48px;
        border-radius: 15px;
        padding: 13px 14px;
      }

      button.full {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 12px;
        line-height: 1.35;
      }

      button.full .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .letter {
        width: 30px;
        height: 30px;
        margin-right: 7px;
        border-radius: 11px;
      }

      .choice-row {
        gap: 12px;
        padding: 14px 12px;
        border-radius: 15px;
      }

      .choice-row > span {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .choice-row .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .choice-row input {
        width: 22px;
        height: 22px;
        margin-top: 4px;
        transform: none;
        flex: 0 0 auto;
      }

      .feedback,
      .definition {
        padding: 14px;
        border-radius: 16px;
        font-size: .95rem;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .actions button {
        width: 100%;
        text-align: center;
      }

      #feedback .actions,
      #openAnswer .actions:last-child,
      .done > button,
      .done .actions {
        position: sticky;
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 5;
        padding: 8px;
        margin: 14px -8px -8px;
        border: 1px solid var(--line);
        border-radius: 17px;
        background: rgba(15, 23, 42, .88);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(0,0,0,.30);
      }

      .side-card {
        padding: 14px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }

      .stat {
        padding: 10px 7px;
        border-radius: 14px;
        text-align: center;
      }

      .stat .num {
        font-size: 1.22rem;
      }

      .stat .label {
        font-size: .72rem;
        line-height: 1.15;
      }

      .mini-list {
        max-height: 170px;
        font-size: .86rem;
      }

      details:not([open]) {
        margin-top: 10px;
      }

      summary {
        min-height: 38px;
        display: flex;
        align-items: center;
      }

      .done {
        padding: 28px 10px;
      }

      .done .emoji {
        font-size: 2.4rem;
      }
    }

    @media (max-width: 380px) {
      .wrap {
        padding-left: 8px;
        padding-right: 8px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .pill:last-child {
        grid-column: auto;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .mode-picker {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .mode-picker select {
        max-width: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="test-column">
        <main class="card main-card">
        <div class="topbar">
          <div class="pill">Zestaw <strong id="bankName">Zestaw 1 (1–6)</strong></div>
          <div class="pill">Runda <strong id="round">1</strong></div>
          <div class="pill">Pytanie <strong id="position">1/1</strong></div>
          <div class="pill">Tryb <strong id="mode">—</strong></div>
        </div>
        <div class="content" id="app"></div>
        </main>

        <div class="test-controls" aria-label="Ustawienia testu">
          <label class="mode-picker" for="questionBank">
            Zestaw
            <select id="questionBank" aria-label="Zestaw pytań">
              <option value="set1">Zestaw 1 (1–6)</option>
              <option value="set2">Zestaw 2 (7–13)</option>
            </select>
          </label>
          <label class="mode-picker" for="filterMode">
            Pytania
            <select id="filterMode" aria-label="Tryb pytań">
              <option value="all">wszystkie</option>
              <option value="closed">zamknięte</option>
              <option value="open">otwarte</option>
            </select>
          </label>
          <button class="secondary" id="resetBtn" type="button">Reset testu</button>
        </div>
      </div>

      <aside>
        <section class="card side-card">
          <h2>Postęp</h2>
          <div class="stats">
            <div class="stat"><span class="num" id="masteredCount">0</span><span class="label">Umiem</span></div>
            <div class="stat"><span class="num" id="reviewCount">0</span><span class="label">Do powtórki</span></div>
            <div class="stat"><span class="num" id="leftCount">0</span><span class="label">W tej rundzie</span></div>
            <div class="stat"><span class="num" id="totalCount">0</span><span class="label">Wszystkich</span></div>
          </div>
          <div class="progress"><div id="progressBar"></div></div>
          <div class="footer-note">Postęp zapisuje się lokalnie osobno dla każdego zestawu pytań. Reset usuwa zapis aktywnego zestawu i tasuje test od nowa.</div>
        </section>

        <section class="card side-card">
          <h2>Kupki</h2>
          <details open>
            <summary>Do powtórki</summary>
            <ol class="mini-list" id="reviewList"></ol>
          </details>
          <details>
            <summary>Umiem</summary>
            <ol class="mini-list" id="masteredList"></ol>
          </details>
        </section>
      </aside>
    </div>
  </div>

  <script id="question-banks-data" type="application/json">[{"key":"set1","label":"Zestaw 1 (1–6)","questions":[{"id":1,"question":"W procesie zabezpieczania systemu informatycznego udział biorą… (In the process of securing the IT system take part …)","type":"closed","options":[{"key":"a","text":"Osoby zarządzające oraz pracownicy firmy. (Managers and employees of the company.)"},{"key":"b","text":"Wyłącznie pracownicy firm zewnętrznych. (Only employees of external companies.)"},{"key":"c","text":"Osoby na szczeblu kierowniczym. (People at management level.)"},{"key":"d","text":"Osoby zarządzające, pracownicy oraz użytkownicy. (Managers, employees and users.)"}],"correct":["d"],"answer":"d) Osoby zarządzające, pracownicy oraz użytkownicy. (Managers, employees and users.)"},{"id":2,"question":"Wskaż typ(y) auditu. (Point the types of audit.)","type":"closed","options":[{"key":"a","text":"Finansowy (Financial)"},{"key":"b","text":"Operacyjny (Operational)"},{"key":"c","text":"Informatyczny (IT audit)"}],"correct":["a","b","c"],"answer":"a) Finansowy (Financial); b) Operacyjny (Operational); c) Informatyczny (IT audit)"},{"id":3,"question":"Protokół SESAME nie umożliwia… (SESAME protocol doesn’t allow to…)","type":"closed","options":[{"key":"a","text":"Unifikacji tylko użytkownika z punktu widzenia uprawnień. (Unify user and application from the point of view of permissions.)"},{"key":"b","text":"Pracę wyłącznie w rozproszonym środowisku heterogenicznym. (Work only in a mesh homogeneous environment.)"},{"key":"c","text":"Zapewnienia spójności i tajności przesyłanych danych. (Ensure consistency and confidentiality of the transferred data.)"},{"key":"d","text":"Kontrolę dostępu do zasobów i usług opartych na uwierzytelnianiu. (Control access to resources and services based on authentication.)"}],"correct":["a"],"answer":"a) Unifikacji tylko użytkownika z punktu widzenia uprawnień. (Unify user and application from the point of view of permissions.)"},{"id":4,"question":"Podczas analizy ryzyka zdarzeniem krytycznym określamy… (During the risk assessment, we determine the critical event.)","type":"closed","options":[{"key":"a","text":"Zdarzenie o wysokich (krytycznych) konsekwencjach. (An event with a low probability of occurrence and with high consequences.)"},{"key":"b","text":"Zdarzenie o średnim prawdopodobieństwie i średnich konsekwencjach (An event with medium probability and medium consequences.)"},{"key":"c","text":"Zdarzenie o wysokim prawdopodobieństwie wystąpienia i o wysokich konsekwencjach. (An event with a high probability of occurrence and with high consequences.)"},{"key":"d","text":"Zdarzenie prawie niemożliwe o niskich konsekwencjach. (An almost impossible event with low consequences.)"}],"correct":["a"],"answer":"a) Zdarzenie o wysokich (krytycznych) konsekwencjach. (An event with a low probability of occurrence and with high consequences.)"},{"id":7,"question":"Podpis cyfrowy umożliwia… (Digital signature allows to…)","type":"open","options":[],"correct":[],"answer":"Poświadczenie autentyczności dokumentu. (Certificate the authenticity of the document.)"},{"id":8,"question":"Która z akcji nie jest przypisywana działaniu wirusów typu robak? (Which action is not an action of a worm virus?)","type":"closed","options":[{"key":"a","text":"Modyfikowanie programu gospodarza. (Modification of the host program.)"},{"key":"b","text":"Usuwanie i niszczenie danych. (Deleting and removing user data.)"},{"key":"c","text":"Zajęcie dostępnych zasobów systemu operacyjnego. (Taking the available system resources.)"},{"key":"d","text":"Wykradzenie danych użytkownika. (Stealing the user’s data.)"}],"correct":["a"],"answer":"a) Modyfikowanie programu gospodarza. (Modification of the host program.)"},{"id":9,"question":"Jak nie należy chronić systemu przed atakami typu Denial of Service? (What activity is not correct during protecting the system against the Denial of Service attacks?)","type":"closed","options":[{"key":"a","text":"Stosować śluzy ogniowe nieblokujące pakietów rozgłoszeniowych. (Using the firewalls that do not block the broadcast packets.)"},{"key":"b","text":"Regularnie monitorować działanie sytemu. (Frequently monitor the system operation.)"},{"key":"c","text":"Implementując rozwiązania zalecanych przez instytucje standaryzujące. (Implementing the solutions pointed by the standardizing institutions.)"},{"key":"d","text":"Stosować hartowanie systemu. (Apply system hardening.)"}],"correct":["a"],"answer":"a) Stosować śluzy ogniowe nieblokujące pakietów rozgłoszeniowych. (Using the firewalls that do not block the broadcast packets.)"},{"id":10,"question":"Bezpieczeństwem systemu nazywamy… (The security of the system is called…)","type":"open","options":[],"correct":[],"answer":"Pożądanym stanem systemu."},{"id":12,"question":"Na czym polega różnica pomiędzy algorytmami kryptografii symetrycznej i asymetrycznej? (What is the difference between symmetric and asymmetric cryptography algorithms?)","type":"open","options":[],"correct":[],"answer":"W algorytmach kryptografii symetrycznej używa się tego samego klucza do szyfrowania i odszyfrowania wiadomości. W asymetrycznej używa się różnych kluczy do tych procesów - zazwyczaj nazywanych \"ukrytym\" (prywatnym) oraz \"jawnym\" (publicznym). Umożliwia to np. (zakładając odpowiednie algorytmy, pewne założenia technologiczne, itd.): - potwierdzenie autorstwa - informacja zaszyfrowana kluczem prywatnym może zostać odszyfrowana kluczem publicznym - wiemy, że nikt inny nie mógł jej zaszyfrować; - ograniczenie odbiorców - informacja zaszyfrowana kluczem publicznym może zostać odszyfrowana jedynie przez właściciela klucza prywatnego - wiemy, że tylko ta osoba odczyta informację."},{"id":13,"question":"Fałszywym odrzuceniem nazywamy... (What is called as false detection?)","type":"closed","options":[{"key":"a","text":"Odrzucenie zagrożenia niebędącym krytycznym zagrożeniem. (Rejection of a threat that is not crucial.)"},{"key":"b","text":"Odrzucenie zdarzenia będącego zagrożeniem. (Rejection of an event that is a threat.)"},{"key":"c","text":"Zaprzestanie działań prewencyjnych w trakcie usuwania zagrożenia. (Stopping the prevention during removing the threat consequences.)"},{"key":"d","text":"Anulowanie działania w przypadku zaistnienia zdarzenia o wyższym priorytecie. (Cancelling the action when a more critical threat occurs.)"}],"correct":["a"],"answer":"a) Odrzucenie zagrożenia niebędącym krytycznym zagrożeniem. (Rejection of a threat that is not crucial.)"},{"id":14,"question":"Ocenę systemów przeprowadza się w celu… (Systems evaluation is carried out for the purpose of…)","type":"closed","options":[{"key":"a","text":"Okresowej oceny bezpieczeństwa systemu, znalezienia i poprawienia istniejących błędów. (Periodic evaluation of system security, finding and correcting existing errors.)"},{"key":"b","text":"Określenia czasu wystąpienia awarii systemu. (Determining the exact time of system failure.)"},{"key":"c","text":"Spełnienia wymogów prawnych producentów podzespołów bazowych serwerowni. (Fulfilling the legal requirements for manufacturers of server equipment.)"},{"key":"d","text":"Opracowania specyfikacji systemu. (Developing the system specifications.)"}],"correct":["a"],"answer":"a) Okresowej oceny bezpieczeństwa systemu, znalezienia i poprawienia istniejących błędów. (Periodic evaluation of system security, finding and correcting existing errors.)"},{"id":18,"question":"Czym charakteryzują się klucze w kryptografii symetrycznej i asymetrycznej? (What is the dependence between keys in symmetrical and asymmetric cryptography?)","type":"closed","options":[{"key":"a","text":"W kryptografii asymetrycznej jeden z kluczy jest jawny. (In asymmetric cryptography, one of the keys is not confidential.)"},{"key":"b","text":"W każdym przypadku te same klucze używane są do szyfrowania i deszyfrowania. (In each case, the same keys are used for encryption and decryption.)"},{"key":"c","text":"Klucze są takiej samej długości. (The keys are the same length.)"},{"key":"d","text":"Klucze nie mogą być wytwarzane przez użytkowników. (Keys can not be generated by users.)"}],"correct":["a"],"answer":"a) W kryptografii asymetrycznej jeden z kluczy jest jawny. (In asymmetric cryptography, one of the keys is not confidential.)"},{"id":19,"question":"Który rodzaj wirusa komputerowego dopisuje swój kod za kodem zasadniczym programu? (Which virus adds its code after the original program code?)","type":"closed","options":[{"key":"a","text":"Appender"},{"key":"b","text":"Overwriter"},{"key":"c","text":"Prepender"},{"key":"d","text":"Apprepender"}],"correct":["a"],"answer":"a) Appender"},{"id":20,"question":"W jakim celu w tzw. bezpiecznych stacjach roboczych stosowane jest silne ekranowanie elektromagnetyczne? (What is the purpose of strong electromagnetic shields in the safe workstations?)","type":"closed","options":[{"key":"a","text":"W celu zwiększenia niezawodności stacji roboczych. (To increase the reliability of the workstations.)"},{"key":"b","text":"W celu uniemożliwienia wykrycia i przechwycenia emisji elektromagnetycznej. (To make it impossible to intercept the electromagnetic emission.)"},{"key":"c","text":"W celu ochrony pracownika przed silnym polem elektromagnetycznym. (To protect the operator against the electromagnetic field.)"},{"key":"d","text":"W celu zachowania wysokiej kompatybilności elektromagnetycznej ze sprzętem komercyjnym (To ensure the compatibility with the commercial solutions.)"}],"correct":["a","b"],"answer":"a) W celu zwiększenia niezawodności stacji roboczych. (To increase the reliability of the workstations.); b) W celu uniemożliwienia wykrycia i przechwycenia emisji elektromagnetycznej. (To make it impossible to intercept the electromagnetic emission.)"},{"id":22,"question":"W jaki sposób sprzętowo zwiększa się bezpieczeństwo systemu informatycznego? (How hardware security of the IT system is increased?)","type":"closed","options":[{"key":"a","text":"Stosowane są dodatkowe linie zasilające oraz łącza telekomunikacyjne. (Additional power and communucational lines are used.)"},{"key":"b","text":"Stosując sporadyczną wymianę przepracowanych podzespołów. (By sporadic replacement of overworked components.)"},{"key":"c","text":"Stosując nadmiarowe podzespoły bazowe w serwerach. (By using redundant components in servers.)"},{"key":"d","text":"Minimalizując liczbę serwerów w celu zmniejszenia prawdopodobieństwa awarii. (By minimizing the number of servers to reduce the probability of failure.)"}],"correct":["a","b","c"],"answer":"a) Stosowane są dodatkowe linie zasilające oraz łącza telekomunikacyjne. (Additional power and communucational lines are used.); b) Stosując sporadyczną wymianę przepracowanych podzespołów. (By sporadic replacement of overworked components.); c) Stosując nadmiarowe podzespoły bazowe w serwerach. (By using redundant components in servers.)"},{"id":24,"question":"Gdzie nie spotyka się systemów detekcji intruzów? (Where we cannot see the IDS systems?)","type":"closed","options":[{"key":"a","text":"W obszarze sieci szkieletowej. (In the area of the core network.)"},{"key":"b","text":"Po stronie serwerów WWW. (On the side of the WWW servers.)"},{"key":"c","text":"Wewnątrz sieci lokalnych. (Inside the local area networks.)"},{"key":"d","text":"W obrębie sieci za zaporą ogniową. (In the network after the firewall.)"}],"correct":["a"],"answer":"a) W obszarze sieci szkieletowej. (In the area of the core network.)"},{"id":26,"question":"Na czym polega jednokierunkowość funkcji skrótu? (What is the principle of opperation of the one-direction hash function?)","type":"closed","options":[{"key":"a","text":"Niemożność odtworzenia danych na podstawie skrótu. (Disability of restoring the data from the hash.)"},{"key":"b","text":"Niemożność wykonania skrótu z wykonanego skrótu. (Disability of creating a new hash from a hash.)"},{"key":"c","text":"Niemożność wykonania skrótu wiadomości o długości innej niż wytwarzany skrót. (Disability of making a hash with a length different from the length of the input data.)"},{"key":"d","text":"Niemożność wykonania skrótu przez osobę weryfikującą wytworzony skrót wiadomości (Disability of creating the hash by a person verifying the hash value.)"}],"correct":["a"],"answer":"a) Niemożność odtworzenia danych na podstawie skrótu. (Disability of restoring the data from the hash.)"},{"id":27,"question":"Który z trybów szyfrowania nie zapewnia powiązania pomiędzy blokami szyfrogramu? (Which of the encryption modes does not provide a connection between the cipher blocks?)","type":"closed","options":[{"key":"a","text":"ECB"},{"key":"b","text":"OFB"},{"key":"c","text":"CBC"},{"key":"d","text":"CFB"}],"correct":["a"],"answer":"a) ECB"},{"id":28,"question":"Które z zagrożeń/problemów nie dotyczy wektorów inicjujących? (Which threat is not related to the initializing vectors?)","type":"closed","options":[{"key":"a","text":"Licznikowy tryb wytwarzania wektorów inicjujących. (Counter mode during generating the initialize vectors.)"},{"key":"b","text":"Losowość generowanych wektorów inicjujących. (Randomness of generated initialize vectors.)"},{"key":"c","text":"Kolizja wektorów inicjujących. (Collision of initializing vectors.)"},{"key":"d","text":"Znany początkowy stan generatora wektorów inicjujących. (Known initial state of the initialize vector generator.)"}],"correct":["a"],"answer":"a) Licznikowy tryb wytwarzania wektorów inicjujących. (Counter mode during generating the initialize vectors.)"},{"id":29,"question":"Protokół Kerberos jest… (Kerberos protocol is …)","type":"closed","options":[{"key":"a","text":"Protokołem uwierzytelnienia symetrycznego. (Symmetric authentication protocol.)"},{"key":"b","text":"Protokołem negocjacji zabezpieczeń i ustalania szybkości szyfrowania. (Protocol for negotiating the security level and determining the encryption rate.)"},{"key":"c","text":"Protokołem uwierzytelniania asymetrycznego. (Asymmetric authentication protocol.)"},{"key":"d","text":"Protokołem stosowanym do szyfrowania transmisji danych strumieniowych. (The protocol used to encrypt a stream data transmission.)"}],"correct":["a"],"answer":"a) Protokołem uwierzytelnienia symetrycznego. (Symmetric authentication protocol.)"},{"id":32,"question":"Do jakiej grupy szyfrów należy algorytm Rijndael / AES? (To which cipher group does the Rijndael / AES algorithm belongs to?)","type":"closed","options":[{"key":"a","text":"Szyfry blokowe symetryczne. (Symmetrical block ciphers.)"},{"key":"b","text":"Szyfry blokowe asymetryczne. (Asymmetrical block ciphers.)"},{"key":"c","text":"Szyfry strumieniowe asymetryczne. (Asymmetrical stream ciphers.)"},{"key":"d","text":"Szyfry strumieniowe symetryczne. (Symmetrical stream ciphers.)"}],"correct":["a"],"answer":"a) Szyfry blokowe symetryczne. (Symmetrical block ciphers.)"},{"id":34,"question":"Jaki rodzaj kryptografii stosowany jest w odniesieniu do kart inteligentnych? (What type of cryptography is used in smart cards?)","type":"closed","options":[{"key":"a","text":"Asymetryczna, np. algorytm RSA. (Asymmetric, e.g. RSA algorithm.)"},{"key":"b","text":"Symetryczna, np. algorytm RSA. (Symmetrical, e.g. RSA algorithm.)"},{"key":"c","text":"Symetryczne klucze jednorazowe. (Symmetrical single-use keys.)"},{"key":"d","text":"Symetryczne funkcje skrótu. (Symmetrical hash functions.)"}],"correct":["a"],"answer":"a) Asymetryczna, np. algorytm RSA. (Asymmetric, e.g. RSA algorithm.)"},{"id":35,"question":"Podczas analizy ryzyka i próbie zwiększenia bezpieczeństwa… (During the risk analysis and an attempt to increase safety…)","type":"closed","options":[{"key":"a","text":"Poszukuje się optimum pomiędzy nakładem środków a minimalizacją ryzyka. (an optimum between effort and risk minimization is looked for.)"},{"key":"b","text":"Wybierane są rozwiązania o najniższym koszcie, aby zminimalizować koszty działalności. (The solution with lowest cost is chosen to minimize operational costs.)"},{"key":"c","text":"Podejmuje się próbę minimalizacji ryzyka za wszelką cenę. (An attempt is made to minimize the risk at all costs.)"},{"key":"d","text":"Dąży się do minimalizacji parametru MTBF minimalizując liczbę krytycznych urządzeń. (We aim to minimize the MTBF parameter by minimizing the number of critical devices.)"}],"correct":["a"],"answer":"a) Poszukuje się optimum pomiędzy nakładem środków a minimalizacją ryzyka. (an optimum between effort and risk minimization is looked for.)"},{"id":37,"question":"Wyjaśnij różnicę pomiędzy atakiem ze znanym szyfrogramem a atakiem ze znanym tekstem jawnym.","type":"open","options":[],"correct":[],"answer":"Atak ze znanym szyfrogramem - np. atakujący wykradł bazę zaszyfrowanych haseł - atakujący musi zweryfikować wykorzystany algorytm szyfrujący (np. SHA-512) na \"prostych hasłach\", np. \"password\" (co może nie być potrzebne jeśli zna szczegóły implementacji). Kiedy zna algorytm musi wykorzystać albo wzorce statystyczne czy inne słabości algorytmu aby złamać szyfr - zakładając że implementacja jest jakkolwiek kompetentna brute-force będzie trwać zbyt długo aby atak był opłacalny. Atak ze znanym tekstem jawnym - np. atakujący ma dostęp do zawartej w każdej wiadomości standardowej formuły - wtedy na bazie relacji atakujący będzie próbował wydedukować klucz - dzięki większej porcji znanych informacji, atak ten ma znacznie większe szanse na sukces - jeśli znany tekst jawny można łatwo połączyć z informacją zaszyfrowaną będzie to wręcz trywialne."},{"id":39,"question":"Czym jest atak ze znanym szyfrogramem? (What is an attack with a known ciphertext?)","type":"closed","options":[{"key":"a","text":"Odtworzeniem tekstu jawnego na podstawie przechwyconego szyfrogramu. (Restoring of plaintext basing on the intercepted ciphertext.)"},{"key":"b","text":"Odtworzeniem tekstu jawnego na podstawie znajomości części klucza. (Restoring of plaintext basing on the knowledge of the part of the key.)"},{"key":"c","text":"Odtworzeniem tekstu jawnego na podstawie znajomości szyfrogramu i fragmentu tekstu jawnego. (Restoring of plaintext basing on the knowledge of the ciphertext and a part of plaintext.)"},{"key":"d","text":"Odtworzeniem tekstu jawnego na podstawie liczby przesłanych szyfrogramów. (Restoring of plaintext basing on the number of transmitted ciphertexts.)"}],"correct":["a"],"answer":"a) Odtworzeniem tekstu jawnego na podstawie przechwyconego szyfrogramu. (Restoring of plaintext basing on the intercepted ciphertext.)"},{"id":40,"question":"Ile czasu zajmuje złamanie szyfrogramu utworzonego z użyciem algorytmu AES z kluczem o długości 128 bitów?","type":"open","options":[],"correct":[],"answer":"2^128 * czas obliczenia pojedyńczego szyfru AES. Dla kontekstu - zakładając że mamy miliard procesorów, z których każdy jest w stanie obliczyć (i porównać) miliard takich szyfrów AES w sekundę, przeczesanie wszystkich tych kombinacji i tak zajmie nieco ponad 10 miliardów tysiącleci. Obliczenia:"},{"id":41,"question":"Detekcja sygnaturowa w systemach detekcji intruzów polega na: (The signature detection in the IDS systems is based on:)","type":"closed","options":[{"key":"a","text":"Wykryciu charakterystycznych zachowań w działaniu systemu. (Detection of characteristic behaviour.)"},{"key":"b","text":"Wykryciu anomalii w zwyczajnym działaniu systemu. (Detection of anomalies in the user’s behaviour.)"},{"key":"c","text":"Wykryciu stopniowej zmiany zachowań użytkowników. (Detection of small changes in the behaviour of the users.)"},{"key":"d","text":"Wykryciu uruchomienia programu z innymi uprawnieniami. (Detection of executing the program with different rights.)"}],"correct":["a"],"answer":"a) Wykryciu charakterystycznych zachowań w działaniu systemu. (Detection of characteristic behaviour.)"},{"id":42,"question":"Do jakiego umiejscowienia nie można przyporządkować zabezpieczeń serwera WWW? (To which location the web server security cannot be assigned?)","type":"closed","options":[{"key":"a","text":"Zabezpieczenia po stronie dostawcy usługi sieciowej. (On the side of network service provider.)"},{"key":"b","text":"Zabezpieczenia po stronie systemu. (System side security.)"},{"key":"c","text":"Zabezpieczenia po stronie aplikacji WWW. (Security on the side of WWW application.)"},{"key":"d","text":"Zabezpieczenia po stronie serwera. (Server-side security.)"}],"correct":["a"],"answer":"a) Zabezpieczenia po stronie dostawcy usługi sieciowej. (On the side of network service provider.)"},{"id":43,"question":"Jakie główne zagrożenie niesie powszechna dostępność narzędzi do przeprowadzenia ataków penetracyjnych? (What the main threat is the availability of tools for conducting the penetration attacks?)","type":"closed","options":[{"key":"a","text":"Umożliwienie przeprowadzenia prostych ataków na systemy informatyczne przez prawie każdą osobę. (Allowing simple attacks on information systems by almost every person.)"},{"key":"b","text":"Możliwość niewykrycia wszystkich słabych punktów systemu z racji niedoskonałości oprogramowania. (Posibility of misdetection of all weak points of the system due to the software imperfections.)"},{"key":"c","text":"Możliwość testowania opracowywanych systemów informatycznych w celu sprawdzenia ich odporności na przykładowe ataki. (Possibility of testing developed IT systems to check their resistance to sample attacks.)"},{"key":"d","text":"Długi czas testów z użyciem gotowych narzędzi. (Long testing time.)"}],"correct":["a"],"answer":"a) Umożliwienie przeprowadzenia prostych ataków na systemy informatyczne przez prawie każdą osobę. (Allowing simple attacks on information systems by almost every person.)"},{"id":44,"question":"Która z technik umożliwia wykrycie nieznanego wirusa komputerowego? (Which technique can be used to detect unknown virus?)","type":"closed","options":[{"key":"a","text":"Skanowanie plików. (File scanning.)"},{"key":"b","text":"Kontrola spójności. (Consistency control.)"},{"key":"c","text":"Blokowanie aktywności w systemie operacyjnym. (Blocking the activity in the operating system.)"},{"key":"d","text":"Niemożliwe jest wykrycie nieznanych wirusów. (It is not possible to detect unknown viruses.)"}],"correct":["a","b","c"],"answer":"a) Skanowanie plików. (File scanning.); b) Kontrola spójności. (Consistency control.); c) Blokowanie aktywności w systemie operacyjnym. (Blocking the activity in the operating system.)"},{"id":46,"question":"Atak typu Denial of Service polega na... (The Denial of Service attack is based on...)","type":"closed","options":[{"key":"a","text":"Uniemożliwieniu normalnego działania systemu. (Preventing the normal operation of the system.)"},{"key":"b","text":"Zmniejszeniu prawdopodobieństwa wykrycia ataku. (Lowering the probability of detection of an attack.)"},{"key":"c","text":"Wykradzeniu tajnych danych użytkownika. (Stealing the user confidential data.)"},{"key":"d","text":"Usunięciu danych użytkownika. (Deleting the user data.)"}],"correct":["a"],"answer":"a) Uniemożliwieniu normalnego działania systemu. (Preventing the normal operation of the system.)"},{"id":47,"question":"Wyciekiem danych nazywamy… (A data leak is a…)","type":"closed","options":[{"key":"a","text":"Niewykrywalny przepływ danych do osób nieuprawnionych. (Undetectable data flow to unauthorized persons.)"},{"key":"b","text":"Odtajnienie danych niejawnych. (Declassification of classified data.)"},{"key":"c","text":"Bezpieczne przekazanie danych osobom trzecim, np. w postaci zaszyfrowanej. (Secure transfer of the data to third parties, e.g. in encrypted form.)"},{"key":"d","text":"Ujawnienie pewnej ilości danych osobom innym niż administratorzy systemu. (Disclosure of a certain amount of data to people other than system administrators.)"}],"correct":["a"],"answer":"a) Niewykrywalny przepływ danych do osób nieuprawnionych. (Undetectable data flow to unauthorized persons.)"},{"id":49,"question":"Jak potocznie nazywa się kolejne cykle obliczeń wykonywanych w algorytmie Rijndael / AES? (How is commonly called the ,,cycles” of calculations performed in the Rijndael / AES algorithm?)","type":"closed","options":[{"key":"a","text":"Rundy (Rounds)"},{"key":"b","text":"Serie (Series)"},{"key":"c","text":"Iteracje (Iterations)"},{"key":"d","text":"Cykle (Cycles)"}],"correct":["a"],"answer":"a) Rundy (Rounds)"},{"id":50,"question":"Wskaż rolę sprzężenia zwrotnego w procesie ewaluacji systemu IT. (Indicate the role of a feedback in the process of IT system evaluation.)","type":"closed","options":[{"key":"a","text":"Możliwość wyeliminowania występujących w systemie błędów. (Ability to eliminate errors in the system.)"},{"key":"b","text":"Zapewnia przepływ informacji pomiędzy kierownictwem a pracownikami. (Provides information flow between managers and employees.)"},{"key":"c","text":"Zapewnienie przekazania danych o audycie do użytkownika końcowego. (Ensuring the transfer of the audit results to the end user.)"},{"key":"d","text":"Umożliwia zlecenie ewaluacji firmie zewnętrznej. (Allows to hire an external company to perform the evaluation.)"}],"correct":["a"],"answer":"a) Możliwość wyeliminowania występujących w systemie błędów. (Ability to eliminate errors in the system.)"},{"id":51,"question":"Które z elementów nie podlegają uwierzytelnieniu? (Which elements are not a subject of authentication?)","type":"closed","options":[{"key":"a","text":"Źródło wirusów komputerowych. (Source of the computer viruses.)"},{"key":"b","text":"Odbiorca dokumentów. (Reciepient of the document.)"},{"key":"c","text":"Zawartość dokumentów. (Content of the documents.)"},{"key":"d","text":"Osoba przesyłająca dokumenty. (The person sending the documents.)"}],"correct":["a"],"answer":"a) Źródło wirusów komputerowych. (Source of the computer viruses.)"},{"id":52,"question":"Wskaż cechę algorytmu RSA. (Indicate the feature of the RSA algorithm.)","type":"closed","options":[{"key":"a","text":"Jest wolniejszy niż algorytm Rijndael / AES. (It is slower than the Rijndael / AES algorithm.)"},{"key":"b","text":"Można go użyć do uwierzytelniania użytkowników. (It can be used to authenticate users.)"},{"key":"c","text":"Nie jest używany w protokołach bezpiecznej wymiany danych. (Not used in secure data exchange protocols.)"},{"key":"d","text":"Jest on przeznaczony do szyfrowania danych strumieniowych. (It is intended for encryption of data stream.)"}],"correct":["a","b"],"answer":"a) Jest wolniejszy niż algorytm Rijndael / AES. (It is slower than the Rijndael / AES algorithm.); b) Można go użyć do uwierzytelniania użytkowników. (It can be used to authenticate users.)"},{"id":53,"question":"Jakie jest podstawowe założenie system detekcji intruzów? (What is the basic assumption of an intrusion detection system?)","type":"closed","options":[{"key":"a","text":"Możliwe jest wykrycie intruza. (It is possible to discover an intruder.)"},{"key":"b","text":"System detekcji intruzów zajmuje minimalną część zasobów systemu. (The IDS system uses only a minor part of the system resources.)"},{"key":"c","text":"System detekcji intruzów jest odporny na ataki typu Denial of Service. (The IDS system is resistant to the Denial of Service attacks.)"},{"key":"d","text":"Włamania wykrywane są z prawdopodobieństwem bliskim 100%. (The intruder can be detected with a probability close to 100%.)"}],"correct":["a"],"answer":"a) Możliwe jest wykrycie intruza. (It is possible to discover an intruder.)"},{"id":55,"question":"Na czym polega kolizja wektorów inicjujących?","type":"open","options":[],"correct":[],"answer":"TL;DR: W przypadku szyfrowania wiadomości pewnym kluczem wykorzystywany jest \"wektor inicjujący\" - losowy ciąg znaków, który stanowi pewną dodatkową zmienną losową w szyfrze. Dzięki jego różnym wartościom nawet jeśli wiadomość jest taka sama, szyfr wyjściowy będzie inny. Jeśli wektor inicjujący jest zawsze taki sam, powtarzające się wiadomości będą produkowały te same wyjście, tym samym psując zamysł szyfru."},{"id":56,"question":"Którą z linii przesyłowych da się podsłuchać? (Which line can be wiretapped?)","type":"closed","options":[{"key":"a","text":"Linię przewodową typu RS-232/RS-485. (RS-232/RS-485 lines.)"},{"key":"b","text":"Połączenie radiowe. (Radio link.)"},{"key":"c","text":"Linię optyczną. (Optic line.)"},{"key":"d","text":"Linię przewodową sieci Ethernet/Token Ring. (Ethernet or Token Ring lines.)"}],"correct":["a","b","c","d"],"answer":"a) Linię przewodową typu RS-232/RS-485. (RS-232/RS-485 lines.); b) Połączenie radiowe. (Radio link.); c) Linię optyczną. (Optic line.); d) Linię przewodową sieci Ethernet/Token Ring. (Ethernet or Token Ring lines.)"},{"id":57,"question":"Jak nazywamy sprawdzenie wiarygodności dokumentu?","type":"open","options":[],"correct":[],"answer":"Uwierzytelnianie (authentication)."},{"id":59,"question":"Podczas analizy ryzyka, zdarzeniem krytycznym określamy...","type":"open","options":[],"correct":[],"answer":"Zdarzenie o niskim prawdopodobieństwie wystąpienia ale wysokich kosztach naprawy i konsekwencjach."},{"id":60,"question":"W jaki sposób sprzętowo zwiększa się bezpieczeństwo systemu informatycznego? (How hardware security of the IT system is increased?)","type":"open","options":[],"correct":[],"answer":"Zapasowe linie zasilające / komunikacyjne, okresowa wymiana podzespołów, stosowanie UPSów."},{"id":61,"question":"Wskaż min. 3 techniczne metody realizacji ataku penetracyjnego.","type":"open","options":[],"correct":[],"answer":"promieniowanie elektromagneyczneskaneryexploity związane z walidacją danych"},{"id":62,"question":"Na czym polega atak typu Distributed Denial of Service?","type":"open","options":[],"correct":[],"answer":"Uniemożliwienie normalnego działania systemu poprzez zalewanie go żądaniami z różnych lokalizacji."},{"id":63,"question":"Na czym polega atak przez powtórzenie i jakie są założenia jego realizacji?","type":"open","options":[],"correct":[],"answer":"Ponowne wysłanie tej samej wiadomości (np. danych do logowania) tak aby system ponownie wykonał tę samą czynność (np. uwierzytelnienie atakującego)."},{"id":64,"question":"Wyjaśnij jaka jest różnica i korzyść ze stosowania sprzętowego wsparcia mechanizmów kryptograficznych / mechanizmów bezpieczeństwa.","type":"open","options":[],"correct":[],"answer":"Korzyścią jest zwiększenie bezpieczeństwa i wydajności ponieważ operacje są wykonywane szybciej i są mniej podatne na ataki z zewnątrz. Oprócz tego, zakładając dobrą implementację, programiści sami będą zachęceni do korzystania z rozwiązań bardziej bezpiecznych poprzez potencjalną łatwość użycia lub dokumentację."},{"id":65,"question":"Co opisuje norma ISO-9001-2015?","type":"closed","options":[{"key":"a","text":"System zarządzania jakością."},{"key":"b","text":"System zarządzania bezpieczeństwem."},{"key":"c","text":"System zarządzania jakością wytwarzanego oprogramowania."},{"key":"d","text":"Sposób realizacji polityki bezpieczeństwa."}],"correct":["a"],"answer":"a) System zarządzania jakością."},{"id":66,"question":"Na czym polega ocena i doskonalenie polityki bezpieczeństwa?","type":"closed","options":[{"key":"a","text":"Periodyczne przeprowadzanie audytów polityki bezpieczeństwa."},{"key":"b","text":"Wykrywaniu stopniowej zmiany postępowania użytkowników."},{"key":"c","text":"Ciągłe monitorowanie i modyfikowanie polityki bezpieczeństwa."},{"key":"d","text":"Ciągłe monitorowanie i rozszerzanie polityki bezpieczeństwa."}],"correct":["a"],"answer":"a) Periodyczne przeprowadzanie audytów polityki bezpieczeństwa."},{"id":132,"question":"Jaka korzyść wynika z zastosowania adaptacyjnych systemów detekcji intruzów IDS?","type":"closed","options":[{"key":"a","text":"Możliwość wykrycia zdarzeń nieznanych podczas projektowania systemu IDS."},{"key":"b","text":"Zmniejszenie wymaganej mocy obliczeniowej."},{"key":"c","text":"Możliwość ograniczenia działania systemów IDS wyłącznie do głównego serwera danego systemu."},{"key":"d","text":"Możliwość zwiększenia skuteczności systemu IDS do 100%."}],"correct":["a"],"answer":"a) Możliwość wykrycia zdarzeń nieznanych podczas projektowania systemu IDS."},{"id":133,"question":"Jaki system nazywamy zaufanym?","type":"closed","options":[{"key":"a","text":"System implementujący politykę bezpieczeństwa."},{"key":"b","text":"System implementujący algorytmy kryptograficzne powszechnie uznane za bezpieczne."},{"key":"c","text":"System w którem dane użytkownika A nigdy nie trafią do użytkownika B."},{"key":"d","text":"System aktualizowany w sposób regularny."}],"correct":["a"],"answer":"a) System implementujący politykę bezpieczeństwa."},{"id":139,"question":"Jak działa sygnaturowy system detekcji intruzów?","type":"open","options":[],"correct":[],"answer":"Sygnaturowy system detekcji intruzów działa poprzez porównywanie ruchu sieciowego lub aktywności systemowej ze znanymi wzorcami (sygnaturami) złośliwego oprogramowania lub ataków."},{"id":146,"question":"Wskaż trzy rodzaje źródeł wiedzy na temat systemów telekomunikacyjnych / informatycznych bądź zabezpieczeń systemów IT.","type":"open","options":[],"correct":[],"answer":"Dokumentacja techniczna i standardy (np. RFC, dokumenty IEEE, specyfikacje producentów). Publikacje naukowe, artykuły konferencyjne oraz książki specjalistyczne. Renomowane portale branżowe, blogi ekspertów ds. bezpieczeństwa oraz raporty i biuletyny bezpieczeństwa wydawane przez organizacje (np. CERT, firmy antywirusowe)."},{"id":148,"question":"Jaką cechę posiada wirus rezydentny?","type":"open","options":[],"correct":[],"answer":"Wirus rezydentny po uruchomieniu pozostaje aktywny w pamięci operacyjnej komputera, co pozwala mu na ciągłe monitorowanie systemu i infekowanie kolejnych plików lub wykonywanie innych złośliwych działań."},{"id":150,"question":"Wyjaśnij jak może działać wirus komputerowy.","type":"open","options":[],"correct":[],"answer":"Wirus komputerowy to złośliwy program, który dołącza swój kod do innych, legalnych plików (tzw. nosicieli), a po uruchomieniu takiego zainfekowanego pliku, wirus replikuje się, infekując kolejne pliki, oraz może wykonywać dodatkowe szkodliwe działania (tzw. ładunek), takie jak niszczenie danych, kradzież informacji czy zakłócanie pracy systemu."},{"id":154,"question":"[Zestaw 2024] Jaka korzyść wynika z zastosowania adaptacyjnych systemów detekcji intruzów — IDS?","type":"closed","options":[{"key":"a","text":"Zmniejszenie wymaganej mocy obliczeniowej."},{"key":"b","text":"Możliwość wykrycia zdarzeń nieznanych podczas projektowania systemu IDS."},{"key":"c","text":"Możliwość ograniczenia działania systemów IDS wyłącznie do głównego serwera danego systemu."},{"key":"d","text":"Możliwość zwiększenia skuteczności systemu IDS do 100%."}],"correct":["b"],"answer":"b) Możliwość wykrycia zdarzeń nieznanych podczas projektowania systemu IDS."},{"id":160,"question":"[Zestaw 2024] Jaki system nazywamy zaufanym?","type":"closed","options":[{"key":"a","text":"System implementujący algorytmy kryptograficzne powszechnie uznane za bezpieczne."},{"key":"b","text":"System, w którym dane użytkownika A nigdy nie trafią do użytkownika B."},{"key":"c","text":"System implementujący politykę bezpieczeństwa."},{"key":"d","text":"System administrowany w sposób regularny."}],"correct":["c"],"answer":"c) System implementujący politykę bezpieczeństwa."},{"id":163,"question":"[Zestaw 2024] Która z technik umożliwia wykrycie nieznanego wirusa komputerowego?","type":"closed","options":[{"key":"a","text":"Blokowanie aktywności w systemie operacyjnym."},{"key":"b","text":"Niemożliwe jest wykrycie nieznanych wirusów."},{"key":"c","text":"Skanowanie plików."},{"key":"d","text":"Kontrola spójności."}],"correct":["a","c","d"],"answer":"a) Blokowanie aktywności w systemie operacyjnym; c) Skanowanie plików; d) Kontrola spójności"},{"id":177,"question":"[Zestaw 2024] Jak działa sygnaturowy system detekcji intruzów?","type":"open","options":[],"correct":[],"answer":"Sygnaturowy IDS porównuje ruch sieciowy lub aktywność systemu ze znanymi wzorcami ataków. Wykrycie zgodności z sygnaturą oznacza podejrzenie incydentu."},{"id":178,"question":"[Zestaw 2024] Wskaż trzy różne rodzaje źródeł wiedzy na temat systemów telekomunikacyjnych / informatycznych bądź zabezpieczeń.","type":"open","options":[],"correct":[],"answer":"Przykładowe źródła to dokumentacja techniczna i standardy, publikacje naukowe/konferencyjne oraz raporty organizacji branżowych lub zespołów CERT. Można też korzystać ze sprawdzonych baz, np. IEEE Xplore."},{"id":180,"question":"[Zestaw 2024] Jaką cechę posiada wirus rezydentny?","type":"open","options":[],"correct":[],"answer":"Wirus rezydentny pozostaje aktywny w pamięci operacyjnej po zakończeniu programu-nosiciela. Dzięki temu może dalej monitorować system i infekować kolejne pliki lub procesy."}]},{"key":"set2","label":"Zestaw 2 (7–13)","questions":[{"id":5,"question":"Który ze standardów dotyczy sieci radiowych Wi-Fi/Bluetooth/WiMax? (Which standard is not related to WiFi/Bluetooth or WiMax networks?)","type":"closed","options":[{"key":"a","text":"802.16e"},{"key":"b","text":"802.15.2"},{"key":"c","text":"802.11.ax"},{"key":"d","text":"802.11i"}],"correct":["a"],"answer":"a) 802.16e"},{"id":6,"question":"Atak typu Man in the Middle w sieciach typu 802.11 polega na: (Man in the middle attack in the 802.11 networks is based on:)","type":"closed","options":[{"key":"a","text":"Utworzeniu fałszywej stacji AP i pośredniczenie w komunikacji użytkowników. (Creating a false access point and intermediating in user’s communications.)"},{"key":"b","text":"Wytworzenie fałszywej wiadomości, która będzie potraktowana jako rzeczywista. (Creating a false message that will be treated as real.)"},{"key":"c","text":"Wytworzeniu silnego sygnału zagłuszającego blokującego transmisję. (Emitting a strong jamming signal.)"},{"key":"d","text":"Wysyłaniu pakietów rozgłoszeniowych do dwóch użytkowników. (Sending a broadcast packets to two users.)"}],"correct":["a"],"answer":"a) Utworzeniu fałszywej stacji AP i pośredniczenie w komunikacji użytkowników. (Creating a false access point and intermediating in user’s communications.)"},{"id":11,"question":"Który z rodzajów spoofingu jest prawdziwy? (Which type of spoofing is real?)","type":"closed","options":[{"key":"a","text":"Spoofing TCP. (TCP spoofing.)"},{"key":"b","text":"Spoofing DNS. (DNS spoofing.)"},{"key":"c","text":"Spoofing SSL. (SSL spoofing.)"},{"key":"d","text":"Spoofing ARP. (ARP spoofing.)"},{"key":"e","text":"Spoofing APR. (APR spoofing.)"},{"key":"f","text":"Spoofing DoS. (DoS spoofing.)"}],"correct":["a","b","c","d"],"answer":"a) Spoofing TCP. (TCP spoofing.); b) Spoofing DNS. (DNS spoofing.); c) Spoofing SSL. (SSL spoofing.); d) Spoofing ARP. (ARP spoofing.)"},{"id":15,"question":"Która z cech jest niepożądana w ujęciu bezpieczeństwa poczty elektronicznej? (Which feature is undesirable with respect to the security of e-mail?)","type":"closed","options":[{"key":"a","text":"Możliwość wyparcia się treści. (Possibility of repudiation.)"},{"key":"b","text":"Zapewnienie poufności wiadomości. (Ensuring the confidentiality of the message.)"},{"key":"c","text":"Weryfikacja tożsamości tylko nadawcy wiadomości. (Verification only the sender identity.)"},{"key":"d","text":"Kontrola spójności wiadomości. (Consistency of the e-mail.)"}],"correct":["a"],"answer":"a) Możliwość wyparcia się treści. (Possibility of repudiation.)"},{"id":16,"question":"Atak typu sniffing polega na … (Sniffing attack is based on…)","type":"closed","options":[{"key":"a","text":"Przechwytywaniu pakietów sieciowych. (Intercepting network packets.)"},{"key":"b","text":"Podszyciu się pod innego użytkownika. (Acting a role of a different user.)"},{"key":"c","text":"Przejęciu dostępnych zasobów sieciowych. (Taking over the available network resources.)"},{"key":"d","text":"Fałszowaniu kluczy uwierzytelniających. (Falsification of authentication keys.)"}],"correct":["a"],"answer":"a) Przechwytywaniu pakietów sieciowych. (Intercepting network packets.)"},{"id":17,"question":"Jakie jest prawdopodobieństwo przechwycenia danych uwierzytelniania użytkowników poczty."},{"key":"c","text":"Do szyfrowania treści wiadomości e-mail."},{"key":"d","text":"Do pobierania poczty z serwera."}],"correct":["a"],"answer":"a) Do definiowania struktury wiadomości e-mail i mechanizmów przesyłania różnych typów informacji (np. załączników binarnych)."},{"id":125,"question":"Jak nazywa się agent poczty elektronicznej, będący klientem poczty, który pozwala użytkownikowi wysyłać i odbierać e-maile (np. Mozilla Thunderbird, Microsoft Outlook)?","type":"closed","options":[{"key":"a","text":"MUA (Mail User Agent)"},{"key":"b","text":"MSA (Mail Submission Agent)"},{"key":"c","text":"MTA (Mail Transfer Agent)"},{"key":"d","text":"MDA (Mail Delivery Agent)"}],"correct":["a"],"answer":"a) MUA (Mail User Agent)"},{"id":126,"question":"Które z poniższych narzędzi wykorzystuje kryptografię symetryczną i asymetryczną do zabezpieczania wiadomości elektronicznych na poziomie aplikacji?","type":"closed","options":[{"key":"a","text":"PGP (Pretty Good Privacy) / GnuPG"},{"key":"b","text":"SPF (Sender Policy Framework)"},{"key":"c","text":"SSL/TLS"},{"key":"d","text":"DKIM (DomainKeys Identified Mail)"}],"correct":["a"],"answer":"a) PGP (Pretty Good Privacy) / GnuPG"},{"id":127,"question":"Jakie algorytmy były używane w PGP w wersji 5.0?","type":"closed","options":[{"key":"a","text":"DSS/D-H, 3-DES, SHA-1, RIPEMD-160"},{"key":"b","text":"AES, ECC, SHA-256"},{"key":"c","text":"IDEA, RSA (do 1024 bitów), MD5"},{"key":"d","text":"Blowfish, Twofish, Whirlpool"}],"correct":["a"],"answer":"a) DSS/D-H, 3-DES, SHA-1, RIPEMD-160"},{"id":128,"question":"Co to jest \"key ring\" (pierścień kluczy) w kontekście PGP?","type":"closed","options":[{"key":"a","text":"Zestaw kluczy (publicznych lub prywatnych)."},{"key":"b","text":"Algorytm służący do generowania par kluczy."},{"key":"c","text":"Fizyczne urządzenie do przechowywania kluczy prywatnych."},{"key":"d","text":"Protokół dystrybucji kluczy publicznych."}],"correct":["a"],"answer":"a) Zestaw kluczy (publicznych lub prywatnych)."},{"id":129,"question":"Która z poniższych NIE jest wymieniona jako słabość PGP?","type":"closed","options":[{"key":"a","text":"Zbyt silne algorytmy szyfrujące, spowalniające działanie."},{"key":"b","text":"Sabotaż na kluczu publicznym (np. podmiana)."},{"key":"c","text":"Kompromitacja hasła (passphrase) chroniącego klucz prywatny."},{"key":"d","text":"Wirusy i Trojany mogące wykraść klucze."}],"correct":["a"],"answer":"a) Zbyt silne algorytmy szyfrujące, spowalniające działanie."},{"id":130,"question":"Czym jest separacja ról w modelu kontroli dostępu RBAC?","type":"closed","options":[{"key":"a","text":"Brak możliwości pełnienia przez użytkownika więcej niż jeden roli w danej chwili."},{"key":"b","text":"Każdy użytkownik może mieć przypisaną wyłącznie jedną rolę w danym systemie."},{"key":"c","text":"Liczba ról przypisana danemu yżytkownikowi jest ograniczona przez jego uprawnienia w danym momencie."},{"key":"d","text":"Jest to niemożność pełnienia roli administratora."}],"correct":["a"],"answer":"a) Brak możliwości pełnienia przez użytkownika więcej niż jeden roli w danej chwili."},{"id":131,"question":"Który ze standardów opisuje sposób realizacji transakcji z użyciem kryptowalut?","type":"closed","options":[{"key":"a","text":"Brak takiego standardu"},{"key":"b","text":"IEEE 802.15.4"},{"key":"c","text":"FIPS PUB SHA-256"},{"key":"d","text":"Blockchain"}],"correct":["a"],"answer":"a) Brak takiego standardu"},{"id":134,"question":"Który z algorytmów / protokołów NIE zabezpiecza poczty elektronicznej?","type":"closed","options":[{"key":"a","text":"SMTP"},{"key":"b","text":"SSL / TLS"},{"key":"c","text":"RSA"},{"key":"d","text":"AES"}],"correct":["a"],"answer":"a) SMTP"},{"id":135,"question":"Które z cech dotyczą elektronicznych transakcji płatniczych?","type":"closed","options":[{"key":"a","text":"Identyfikowalność, rejestracja operacji."},{"key":"b","text":"Skalowalność, poufność."},{"key":"c","text":"Przejrzystość, podzielność."},{"key":"d","text":"Niezależność od lokalizacji, prostota implementacji."}],"correct":["a"],"answer":"a) Identyfikowalność, rejestracja operacji."},{"id":136,"question":"Jakie rodzaje ramek są spotykane w siechach typu 802.11?","type":"closed","options":[{"key":"a","text":"Ramki danych, ramki organizacyjne."},{"key":"b","text":"Ramki kontrolujące, ramki inicjalizujące."},{"key":"c","text":"Ramki szyfrujące, ramki uwierzytelniające."},{"key":"d","text":"Ramki sterujące, ramki popierdolone"}],"correct":["a"],"answer":"a) Ramki danych, ramki organizacyjne."},{"id":137,"question":"Czym jest PGP (Pretty Good Privacy)?","type":"closed","options":[{"key":"a","text":"Narzędziem do zabezpieczania poczty elektronicznej."},{"key":"b","text":"Narzędziem do wytwarzania kluczy zabezpieczających pocztę elektroniczną."},{"key":"c","text":"Protokołem uwierzytelniania użytkowników."},{"key":"d","text":"Protokołem do wytwarzania i dystrybucji certyfikatów użytkowników."}],"correct":["a"],"answer":"a) Narzędziem do zabezpieczania poczty elektronicznej."},{"id":138,"question":"Dlaczego łatwo jest zrealizować atak na sieć typu 802.11?","type":"closed","options":[{"key":"a","text":"Sieci typu 802.11 używają interfejsu radiowego używanego przez wiele urządzeń konsumenckich i deweloperskich."},{"key":"b","text":"W sieciach tego typu nie stosuje się szyfrowania pakietów potwierdzających typu ACK."},{"key":"c","text":"Przyczyną jest słabość protokołu EAP."},{"key":"d","text":"W sieciach typu 802.11 nie stosuje się wystarczająco silnych algorytmów do szyfrowania przesyłania danych."}],"correct":["a"],"answer":"a) Sieci typu 802.11 używają interfejsu radiowego używanego przez wiele urządzeń konsumenckich i deweloperskich."},{"id":140,"question":"W jakim celu stosowane jest tunelowanie SSL/TLS (wskaż dwa elementy)?","type":"open","options":[],"correct":[],"answer":"Zapewnienie poufności przesyłanych danych poprzez ich szyfrowanie. Uwierzytelnienie komunikujących się stron (przynajmniej serwera, a opcjonalnie również klienta) w celu potwierdzenia ich tożsamości."},{"id":141,"question":"W jaki sposób można zabezpieczyć system przed atakiem typu sniffing?","type":"open","options":[],"correct":[],"answer":"System przed atakiem typu sniffing można zabezpieczyć głównie poprzez szyfrowanie komunikacji sieciowej (np. za pomocą protokołów HTTPS, VPN, WPA2/3) oraz stosowanie przełączników sieciowych zamiast koncentratorów."},{"id":142,"question":"Wskaż dwie różnice pomiędzy modelem kontroli dostępu MAC (Mandatory Access Control) i DAC (Discretionary Access Control).","type":"open","options":[],"correct":[],"answer":"W MAC polityka dostępu jest narzucana centralnie przez system (administratora) na podstawie etykiet bezpieczeństwa, podczas gdy w DAC właściciel zasobu decyduje, kto ma do niego dostęp i na jakich zasadach.MAC jest modelem niedyskrecjonalnym (użytkownicy nie mogą zmieniać uprawnień nadanych przez system), a DAC jest dyskrecjonalny (właściciele mogą dowolnie przyznawać i odbierać uprawnienia do swoich zasobów)."},{"id":143,"question":"Czy w rozproszonych systemach pocztowych możliwe jest zastosowanie fully homomorphic encryption (FHE), jeśli tak/nie, to dlaczego?","type":"open","options":[],"correct":[],"answer":"Teoretycznie tak, ponieważ FHE pozwalałoby na operacje na zaszyfrowanych wiadomościach (np. filtrowanie spamu, wyszukiwanie) bez ich deszyfrowania na serwerze, jednak obecnie jest to niepraktyczne ze względu na ogromną wymaganą moc obliczeniową i niską wydajność FHE."},{"id":144,"question":"Wskaż dwie wady połączenia tunelowego typu VPN (Virtual Private Network).","type":"open","options":[],"correct":[],"answer":"Dodatkowy narzut (overhead) na transmisję związany z enkapsulacją i szyfrowaniem, co może nieznacznie zmniejszyć efektywną przepustowość. Potencjalna złożoność konfiguracji i zarządzania, zwłaszcza w dużych sieciach, oraz zależność od wydajności i niezawodności serwera VPN."},{"id":145,"question":"Ile urządzeń można wykryć w sieci lokalnej podczas skanowania otoczenia sieciowego jeśli stała część adresów sieciowych to 10.10.127.xxx/24?","type":"open","options":[],"correct":[],"answer":"W sieci z maską /24 (255.255.255.0) jest 8 bitów na część hosta, co daje 2^8 = 256 możliwych adresów; odejmując adres sieci (xxx.0) i adres rozgłoszeniowy (xxx.255), pozostają 254 adresy dostępne dla urządzeń."},{"id":147,"question":"Wyjaśnij czym jest SSL (Secure Socket Layer).","type":"open","options":[],"correct":[],"answer":"SSL (Secure Socket Layer) to protokół kryptograficzny zaprojektowany w celu zapewnienia bezpiecznej (poufnej, integralnej i uwierzytelnionej) komunikacji przez sieć komputerową, np. Internet, będący poprzednikiem nowocześniejszego protokołu TLS."},{"id":149,"question":"Z czego wynika przewaga komputerów kwantowych (z punktu widzenia szybkości obliczeniowej) nad komputerami klasycznymi (rozumianymi w sposób powszechny)?","type":"open","options":[],"correct":[],"answer":"Przewaga komputerów kwantowych wynika z wykorzystania zjawisk mechaniki kwantowej, takich jak superpozycja (kubit może reprezentować 0, 1 lub oba stany jednocześnie) i splątanie, co pozwala na wykonywanie wielu obliczeń równolegle i potencjalnie wykładniczo szybsze rozwiązywanie niektórych specyficznych problemów (np. obliczanie pomnożonych przez siebie liczb pierwszych na bazie wyniku, nadzwyczaj pomocne w świecie aktualnie używanych zabezpieczeń PKI)."},{"id":152,"question":"[Zestaw 2024] Co jest segregacją ról w modelu kontroli dostępu RBAC?","type":"closed","options":[{"key":"a","text":"Brak możliwości pełnienia przez użytkownika więcej niż jednej roli w danej chwili."},{"key":"b","text":"Każdy użytkownik musi mieć przypisaną wyłącznie jedną rolę w danym systemie."},{"key":"c","text":"Liczba ról przypisana danemu użytkownikowi jest ograniczona przez jego uprawnienia w danym systemie."},{"key":"d","text":"Jest to harmonogram pełnienia ról administratora."}],"correct":["a"],"answer":"a) Brak możliwości pełnienia przez użytkownika więcej niż jednej roli w danej chwili."},{"id":153,"question":"[Zestaw 2024] Który ze standardów opisuje sposób realizacji transakcji z użyciem kryptowalut?","type":"closed","options":[{"key":"a","text":"IEEE 802.15.4"},{"key":"b","text":"Brak takiego standardu"},{"key":"c","text":"FIPS PUB 180-2 / SHA-256"},{"key":"d","text":"Blockchain"}],"correct":["b"],"answer":"b) Brak takiego standardu"},{"id":155,"question":"[Zestaw 2024] Do procesu zarządzania transakcjami należy:","type":"closed","options":[{"key":"a","text":"Pominięcie procesu weryfikacji zaufanych klientów."},{"key":"b","text":"Archiwizowanie certyfikatów transakcji."},{"key":"c","text":"Rejestrowanie i unieważnianie transakcji."},{"key":"d","text":"Przeprowadzenie certyfikacji bez konieczności weryfikacji poprawności transakcji."}],"correct":["c"],"answer":"c) Rejestrowanie i unieważnianie transakcji."},{"id":156,"question":"[Zestaw 2024] Który z rodzajów spoofingu jest prawdziwy?","type":"closed","options":[{"key":"a","text":"Spoofing APR"},{"key":"b","text":"Spoofing TCP"},{"key":"c","text":"Spoofing DoS"},{"key":"d","text":"Spoofing SSL"}],"correct":["b"],"answer":"b) Spoofing TCP"},{"id":157,"question":"[Zestaw 2024] W jakim celu stosowane jest tunelowanie SSL/TLS? Wskaż dwa elementy.","type":"open","options":[],"correct":[],"answer":"Tunelowanie SSL/TLS stosuje się do szyfrowania transmisji w niezabezpieczonej sieci oraz do uwierzytelnienia komunikujących się stron, przynajmniej serwera. Dodatkowo pomaga chronić integralność przesyłanych danych."},{"id":158,"question":"[Zestaw 2024] W jaki sposób można zabezpieczyć sieci bezprzewodowe przed atakiem typu sniffing?","type":"open","options":[],"correct":[],"answer":"Należy szyfrować transmisję, np. WPA2/WPA3/802.11i, oraz stosować silne hasła albo uwierzytelnianie 802.1X. Dodatkowo można używać VPN/HTTPS, aby dane były chronione także po przechwyceniu ramek."},{"id":159,"question":"[Zestaw 2024] Obniżenie przepustowości sieci bezprzewodowej jako atak może być spowodowane przez:","type":"closed","options":[{"key":"a","text":"Celowe przesyłanie pakietów TCP/IP ze zmodyfikowanym nagłówkiem."},{"key":"b","text":"Naruszanie zasad wielodostępu do kanału radiowego."},{"key":"c","text":"Celowe przesyłanie danych/plików o znaczącym rozmiarze, rzędu GB."},{"key":"d","text":"Celowe wybranie kanału o większej szerokości pasma."}],"correct":["b"],"answer":"b) Naruszanie zasad wielodostępu do kanału radiowego."},{"id":161,"question":"[Zestaw 2024] Na czym polega atak typu Man in the Middle w sieciach typu 802.11?","type":"open","options":[],"correct":[],"answer":"Atakujący tworzy fałszywy punkt dostępowy lub pośredniczy między klientem a prawdziwym AP, przechwytując i przekazując ruch. Często poprzedza to rozłączeniem ofiary, np. pakietami DEAUTH."},{"id":162,"question":"[Zestaw 2024] Wskaż dwie różnice pomiędzy modelem kontroli dostępu MAC i DAC.","type":"open","options":[],"correct":[],"answer":"W MAC polityka dostępu jest narzucana centralnie przez system/administratora, najczęściej na podstawie etykiet bezpieczeństwa. W DAC właściciel zasobu decyduje, komu nadać lub odebrać uprawnienia."},{"id":164,"question":"[Zestaw 2024] Czy w rozproszonych systemach pocztowych możliwe jest zastosowanie fully homomorphic encryption — FHE? Jeśli tak/nie, to dlaczego?","type":"open","options":[],"correct":[],"answer":"Teoretycznie tak, bo FHE pozwala wykonywać operacje na zaszyfrowanych danych bez ich odszyfrowywania. W praktyce jest to obecnie mało użyteczne w poczcie rozproszonej ze względu na bardzo duży narzut obliczeniowy i wydajnościowy."},{"id":165,"question":"[Zestaw 2024] Który z algorytmów/protokołów nie zabezpiecza poczty elektronicznej?","type":"closed","options":[{"key":"a","text":"SSL/TLS"},{"key":"b","text":"RSA"},{"key":"c","text":"SMTP"},{"key":"d","text":"AES"}],"correct":["c"],"answer":"c) SMTP"},{"id":166,"question":"[Zestaw 2024] Które z cech dotyczą elektronicznych transakcji płatniczych?","type":"closed","options":[{"key":"a","text":"Niezależność od lokalizacji, prostota implementacji."},{"key":"b","text":"Przejrzystość, podzielność."},{"key":"c","text":"Skalowalność, poufność."},{"key":"d","text":"Identyfikowalność, rejestracja operacji."}],"correct":["d"],"answer":"d) Identyfikowalność, rejestracja operacji."},{"id":167,"question":"[Zestaw 2024] Który z modeli kontroli dostępu umożliwia zastosowanie dodatkowego modelu kontroli dostępu?","type":"open","options":[],"correct":[],"answer":"RBAC"},{"id":171,"question":"[Zestaw 2024] Jakie rodzaje ramek są spotykane w sieci typu 802.11?","type":"closed","options":[{"key":"a","text":"Ramki danych, ramki organizacyjne."},{"key":"b","text":"Ramki inicjujące, ramki rozłączające."},{"key":"c","text":"Ramki szyfrujące, ramki uwierzytelniające."},{"key":"d","text":"Ramki sterujące, ramki potwierdzające."}],"correct":["a","d"],"answer":"a) Ramki danych, ramki organizacyjne; d) Ramki sterujące, ramki potwierdzające. Podstawowe typy ramek 802.11 to: zarządzające/organizacyjne, sterujące/kontrolne oraz danych."},{"id":172,"question":"[Zestaw 2024] Do jakiego uwierzytelniania po stronie serwera są przeznaczone zastosowane mechanizmy SSL/TLS?","type":"closed","options":[{"key":"a","text":"Zabezpieczenia po stronie dostawcy usług sieciowych."},{"key":"b","text":"Zabezpieczenia po stronie serwera."},{"key":"c","text":"Zabezpieczenia po stronie aplikacji."},{"key":"d","text":"Zabezpieczenia po stronie procesu."}],"correct":["b"],"answer":"b) Zabezpieczenia po stronie serwera."},{"id":173,"question":"[Zestaw 2024] Wskaż dwie wady połączenia sieciowego typu VPN.","type":"open","options":[],"correct":[],"answer":"VPN powoduje dodatkowy narzut na transmisję przez enkapsulację i szyfrowanie, co może zmniejszać przepustowość. Drugą wadą jest większa złożoność konfiguracji oraz zależność od wydajności i dostępności serwera VPN."},{"id":174,"question":"[Zestaw 2024] Ile urządzeń sieciowych można wykryć w sieci lokalnej podczas skanowania segmentu sieciowego, jeśli stała część adresu sieciowego to 10.10.12.xxx/20?","type":"open","options":[],"correct":[],"answer":"W sieci /20 jest 12 bitów na hosty, czyli 2^12 = 4096 adresów. Po odjęciu adresu sieci i rozgłoszeniowego pozostaje 4094 możliwych adresów urządzeń."},{"id":175,"question":"[Zestaw 2024] Czym jest PGP — Pretty Good Privacy?","type":"closed","options":[{"key":"a","text":"Narzędziem do tworzenia kluczy zabezpieczających pocztę elektroniczną."},{"key":"b","text":"Narzędziem do zabezpieczania poczty elektronicznej."},{"key":"c","text":"Protokołem uwierzytelniania użytkowników."},{"key":"d","text":"Protokołem do wytwarzania i dystrybucji certyfikatów użytkowników."}],"correct":["b"],"answer":"b) Narzędziem do zabezpieczania poczty elektronicznej."},{"id":176,"question":"[Zestaw 2024] Dlaczego łatwo jest zrealizować atak na sieć typu 802.11?","type":"closed","options":[{"key":"a","text":"Sieci typu 802.11 używają interfejsu radiowego używanego przez wiele urządzeń komunikacji bezpośredniej."},{"key":"b","text":"W sieciach tego typu nie stosuje się szyfrowania pakietów potwierdzających typu ACK."},{"key":"c","text":"Przyczyną jest słabość protokołu EAP."},{"key":"d","text":"W sieciach typu 802.11 nie stosuje się wystarczająco silnych algorytmów do szyfrowania przesyłanych danych."}],"correct":["a"],"answer":"a) Sieci typu 802.11 używają interfejsu radiowego używanego przez wiele urządzeń komunikacji bezpośredniej."},{"id":179,"question":"[Zestaw 2024] Wyjaśnij, czym jest SSL — Secure Socket Layer.","type":"open","options":[],"correct":[],"answer":"SSL to protokół kryptograficzny służący do zabezpieczania komunikacji w sieci przez szyfrowanie, kontrolę integralności i uwierzytelnianie stron. Obecnie został zastąpiony przez TLS, choć nazwa SSL bywa nadal używana potocznie."},{"id":181,"question":"[Zestaw 2025] W jaki sposób można zabezpieczyć sieci bezprzewodowe przed atakiem typu sniffing?","type":"open","options":[],"correct":[],"answer":"Należy szyfr
