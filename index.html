<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Test — cyberbezpieczeństwo</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, .86);
      --card: rgba(30, 41, 59, .92);
      --muted: #94a3b8;
      --text: #e5e7eb;
      --strong: #f8fafc;
      --line: rgba(148, 163, 184, .24);
      --accent: #38bdf8;
      --accent-2: #22c55e;
      --danger: #fb7185;
      --warn: #f59e0b;
      --shadow: 0 24px 80px rgba(0,0,0,.35);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(56, 189, 248, .18), transparent 32rem),
        radial-gradient(circle at 80% 0%, rgba(34, 197, 94, .12), transparent 28rem),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .wrap {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.55rem);
      letter-spacing: -.035em;
      line-height: 1.05;
    }

    .sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: .98rem;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .test-column {
      display: grid;
      gap: 12px;
    }

    .test-controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .mode-picker {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 8px 10px;
      font-size: .92rem;
      font-weight: 750;
    }

    .mode-picker select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 7px 34px 7px 10px;
      color: var(--strong);
      background:
        linear-gradient(45deg, transparent 50%, var(--accent) 50%) calc(100% - 18px) calc(50% - 3px) / 6px 6px no-repeat,
        linear-gradient(135deg, var(--accent) 50%, transparent 50%) calc(100% - 12px) calc(50% - 3px) / 6px 6px no-repeat,
        rgba(2, 6, 23, .45);
      font: inherit;
      font-weight: 750;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
      align-items: start;
    }

    @media (max-width: 860px) {
      header { align-items: flex-start; flex-direction: column; }
      .header-actions { justify-content: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .main-card {
      min-height: 500px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(15, 23, 42, .45);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: rgba(15, 23, 42, .45);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: .88rem;
      white-space: nowrap;
    }

    .pill strong {
      color: var(--strong);
      font-weight: 700;
    }

    .content {
      padding: 24px;
    }

    .question-number {
      color: var(--accent);
      font-size: .9rem;
      font-weight: 750;
      margin-bottom: 10px;
    }

    .question {
      margin: 0 0 18px;
      font-size: clamp(1.24rem, 2.5vw, 1.7rem);
      line-height: 1.28;
      letter-spacing: -.02em;
      color: var(--strong);
    }

    .hint {
      color: var(--muted);
      margin: 0 0 18px;
      line-height: 1.55;
    }

    .answers {
      display: grid;
      gap: 10px;
      margin: 18px 0;
    }

    button, .btn {
      appearance: none;
      border: 0;
      border-radius: 16px;
      padding: 12px 14px;
      font: inherit;
      font-weight: 750;
      cursor: pointer;
      color: #07111f;
      background: var(--accent);
      transition: transform .12s ease, filter .12s ease, border-color .12s ease, background .12s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      color: var(--text);
      background: rgba(148, 163, 184, .12);
      border: 1px solid var(--line);
    }

    button.good {
      background: var(--accent-2);
      color: #04130a;
    }

    button.bad {
      background: var(--danger);
      color: #21040a;
    }

    button.warn {
      background: var(--warn);
      color: #1f1300;
    }

    button.ghost {
      color: var(--text);
      background: transparent;
      border: 1px solid var(--line);
    }

    button.full {
      width: 100%;
      text-align: left;
      color: var(--text);
      background: rgba(15, 23, 42, .5);
      border: 1px solid var(--line);
      line-height: 1.4;
      font-weight: 650;
    }

    button.full:hover {
      border-color: rgba(56, 189, 248, .65);
      background: rgba(56, 189, 248, .10);
    }

    .letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      margin-right: 9px;
      border-radius: 10px;
      background: rgba(56, 189, 248, .16);
      color: #7dd3fc;
      font-weight: 850;
      text-transform: uppercase;
      vertical-align: top;
    }

    .feedback {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(15, 23, 42, .55);
      line-height: 1.55;
    }

    .feedback.good-border {
      border-color: rgba(34, 197, 94, .45);
    }

    .feedback.bad-border {
      border-color: rgba(251, 113, 133, .50);
    }

    .definition {
      white-space: pre-wrap;
      background: rgba(2, 6, 23, .45);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      margin: 16px 0;
      line-height: 1.55;
    }

    .choice-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: rgba(15, 23, 42, .45);
      line-height: 1.45;
      cursor: pointer;
    }

    .choice-row input {
      margin-top: 4px;
      transform: scale(1.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    aside {
      display: grid;
      gap: 18px;
    }

    .side-card {
      padding: 18px;
    }

    .side-card h2 {
      margin: 0 0 14px;
      font-size: 1rem;
      color: var(--strong);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(15, 23, 42, .45);
    }

    .stat .num {
      display: block;
      font-size: 1.6rem;
      font-weight: 850;
      color: var(--strong);
      line-height: 1;
    }

    .stat .label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: .84rem;
    }

    .progress {
      height: 12px;
      border-radius: 999px;
      background: rgba(148, 163, 184, .16);
      overflow: hidden;
      border: 1px solid var(--line);
      margin: 12px 0 8px;
    }

    .progress > div {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transition: width .25s ease;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-weight: 750;
    }

    .mini-list {
      margin: 10px 0 0;
      padding-left: 19px;
      color: var(--muted);
      font-size: .9rem;
      line-height: 1.45;
      max-height: 260px;
      overflow: auto;
    }

    .mini-list li {
      margin: 7px 0;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
      margin: 0;
    }

    .done {
      text-align: center;
      padding: 42px 24px;
    }

    .done .emoji {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 12px;
    }

    .done h2 {
      margin: 0 0 10px;
      color: var(--strong);
      font-size: clamp(1.4rem, 3vw, 2.1rem);
    }

    .kbd {
      display: inline-flex;
      border: 1px solid var(--line);
      border-bottom-width: 2px;
      border-radius: 8px;
      padding: 1px 7px;
      color: var(--strong);
      background: rgba(15, 23, 42, .75);
      font-size: .84rem;
      font-weight: 750;
    }

    .footer-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.45;
    }


    /* Mobile-first polish */
    html {
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    button,
    select,
    input {
      font-size: 16px;
    }

    button,
    .choice-row,
    .mode-picker select,
    summary {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    button:focus-visible,
    .choice-row:focus-within,
    .mode-picker select:focus-visible {
      outline: 3px solid rgba(56, 189, 248, .45);
      outline-offset: 3px;
    }

    .question,
    .definition,
    .feedback,
    button.full,
    .choice-row,
    .mini-list {
      overflow-wrap: anywhere;
    }

    @media (hover: none) {
      button:hover {
        transform: none;
        filter: none;
      }
    }

    @media (max-width: 700px) {
      :root {
        --radius: 18px;
        --shadow: 0 16px 44px rgba(0,0,0,.28);
      }

      body {
        background:
          radial-gradient(circle at 0% 0%, rgba(56, 189, 248, .16), transparent 22rem),
          radial-gradient(circle at 100% 0%, rgba(34, 197, 94, .10), transparent 20rem),
          var(--bg);
      }

      .wrap {
        width: 100%;
        padding: 14px 10px calc(24px + env(safe-area-inset-bottom));
      }

      .test-column {
        gap: 10px;
      }

      .test-controls {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 10px;
        border-radius: 17px;
      }

      .mode-picker {
        width: 100%;
        justify-content: space-between;
        padding: 10px;
        border-radius: 15px;
      }

      .mode-picker select {
        min-height: 44px;
        flex: 1;
        max-width: 190px;
      }

      #resetBtn {
        width: 100%;
        min-height: 46px;
        text-align: center;
      }

      .grid {
        gap: 12px;
      }

      .card {
        border-radius: var(--radius);
      }

      .main-card {
        min-height: 0;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 10px;
      }

      .pill {
        justify-content: center;
        padding: 8px 9px;
        font-size: .82rem;
      }

      .pill:last-child {
        grid-column: 1 / -1;
      }

      .content {
        padding: 16px 12px;
      }

      .question-number {
        font-size: .84rem;
        margin-bottom: 8px;
      }

      .question {
        margin-bottom: 14px;
        font-size: clamp(1.08rem, 5.2vw, 1.34rem);
        line-height: 1.32;
      }

      .hint {
        margin-bottom: 14px;
        font-size: .94rem;
        line-height: 1.45;
      }

      .answers {
        gap: 9px;
        margin: 14px 0;
      }

      button,
      .btn {
        min-height: 48px;
        border-radius: 15px;
        padding: 13px 14px;
      }

      button.full {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 14px 12px;
        line-height: 1.35;
      }

      button.full .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .letter {
        width: 30px;
        height: 30px;
        margin-right: 7px;
        border-radius: 11px;
      }

      .choice-row {
        gap: 12px;
        padding: 14px 12px;
        border-radius: 15px;
      }

      .choice-row > span {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .choice-row .letter {
        margin-right: 0;
        flex: 0 0 30px;
      }

      .choice-row input {
        width: 22px;
        height: 22px;
        margin-top: 4px;
        transform: none;
        flex: 0 0 auto;
      }

      .feedback,
      .definition {
        padding: 14px;
        border-radius: 16px;
        font-size: .95rem;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .actions button {
        width: 100%;
        text-align: center;
      }

      #feedback .actions,
      #openAnswer .actions:last-child,
      .done > button,
      .done .actions {
        position: sticky;
        bottom: max(8px, env(safe-area-inset-bottom));
        z-index: 5;
        padding: 8px;
        margin: 14px -8px -8px;
        border: 1px solid var(--line);
        border-radius: 17px;
        background: rgba(15, 23, 42, .88);
        backdrop-filter: blur(14px);
        box-shadow: 0 12px 28px rgba(0,0,0,.30);
      }

      .side-card {
        padding: 14px;
      }

      .stats {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 7px;
      }

      .stat {
        padding: 10px 7px;
        border-radius: 14px;
        text-align: center;
      }

      .stat .num {
        font-size: 1.22rem;
      }

      .stat .label {
        font-size: .72rem;
        line-height: 1.15;
      }

      .mini-list {
        max-height: 170px;
        font-size: .86rem;
      }

      details:not([open]) {
        margin-top: 10px;
      }

      summary {
        min-height: 38px;
        display: flex;
        align-items: center;
      }

      .done {
        padding: 28px 10px;
      }

      .done .emoji {
        font-size: 2.4rem;
      }
    }

    @media (max-width: 380px) {
      .wrap {
        padding-left: 8px;
        padding-right: 8px;
      }

      .topbar {
        grid-template-columns: 1fr;
      }

      .pill:last-child {
        grid-column: auto;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }

      .mode-picker {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
      }

      .mode-picker select {
        max-width: none;
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid">
      <div class="test-column">
        <main class="card main-card">
        <div class="topbar">
          <div class="pill">Runda <strong id="round">1</strong></div>
          <div class="pill">Pytanie <strong id="position">1/1</strong></div>
          <div class="pill">Tryb <strong id="mode">—</strong></div>
        </div>
        <div class="content" id="app"></div>
        </main>

        <div class="test-controls" aria-label="Ustawienia testu">
          <label class="mode-picker" for="filterMode">
            Pytania
            <select id="filterMode" aria-label="Tryb pytań">
              <option value="all">wszystkie</option>
              <option value="closed">zamknięte</option>
              <option value="open">otwarte</option>
            </select>
          </label>
          <button class="secondary" id="resetBtn" type="button">Reset testu</button>
        </div>
      </div>

      <aside>
        <section class="card side-card">
          <h2>Postęp</h2>
          <div class="stats">
            <div class="stat"><span class="num" id="masteredCount">0</span><span class="label">Umiem</span></div>
            <div class="stat"><span class="num" id="reviewCount">0</span><span class="label">Do powtórki</span></div>
            <div class="stat"><span class="num" id="leftCount">0</span><span class="label">W tej rundzie</span></div>
            <div class="stat"><span class="num" id="totalCount">0</span><span class="label">Wszystkich</span></div>
          </div>
          <div class="progress"><div id="progressBar"></div></div>
          <div class="footer-note">Postęp zapisuje się lokalnie w tej przeglądarce. Reset usuwa zapis i tasuje test od nowa.</div>
        </section>

        <section class="card side-card">
          <h2>Kupki</h2>
          <details open>
            <summary>Do powtórki</summary>
            <ol class="mini-list" id="reviewList"></ol>
          </details>
          <details>
            <summary>Umiem</summary>
            <ol class="mini-list" id="masteredList"></ol>
          </details>
        </section>
      </aside>
    </div>

ext":"próba złamania szyfru"},{"key":"c","text":"nieautoryzowany dostęp do sieci"},{"key":"d","text":"zainfekowanie systemu operacyjnego"}],"correct":["a"],"answer":"a) blokada usług"},{"id":59,"question":"Które z poniższych określeń najlepiej opisuje uwierzytelnianie?","type":"closed","options":[{"key":"a","text":"potwierdzenie dowodu tożsamości użytkownika"},{"key":"b","text":"środki za pomocą których użytkownik prezentuje swoją obecność"},{"key":"c","text":"zdolność systemu do określenia zachowań użytkownika"},{"key":"d","text":"prawa użytkownika do dostępu do zasobów"}],"correct":["a"],"answer":"a) potwierdzenie dowodu tożsamości użytkownika"},{"id":60,"question":"„Dziury\" w systemie można łatać:","type":"closed","options":[{"key":"a","text":"za pomocą poprawek"},{"key":"b","text":"za pomocą szyfrowania"},{"key":"c","text":"za pomocą ścian ogniowych"},{"key":"d","text":"rozbudowując sprzęt"}],"correct":["a"],"answer":"a) za pomocą poprawek"},{"id":61,"question":"DMZ (Demilitarized Zone) jest charakterystyczna dla konfiguracji","type":"closed","options":[{"key":"a","text":"screened subnet"},{"key":"b","text":"screening router"},{"key":"c","text":"dual home gateway"},{"key":"d","text":"screened host gateway"}],"correct":["a"],"answer":"a) screened subnet"},{"id":62,"question":"Która z wymienionych niżej grup przyczynia się najczęściej do utraty istotnych informacji w firmie?","type":"closed","options":[{"key":"a","text":"pracownicy"},{"key":"b","text":"crackers"},{"key":"c","text":"hackers"},{"key":"d","text":"sabotażyści"}],"correct":["a"],"answer":"a) pracownicy"},{"id":63,"question":"IP source routing jest jednym z narzędzi:","type":"closed","options":[{"key":"a","text":"maskarady"},{"key":"b","text":"podsłuchiwania"},{"key":"c","text":"przekazywania"},{"key":"d","text":"przechwytywania połączeń"}],"correct":["a"],"answer":"a) maskarady"},{"id":64,"question":"Która kategoria włamywaczy jest najbardziej niebezpieczna dla firmy?","type":"closed","options":[{"key":"a","text":"szpiedzy"},{"key":"b","text":"turyści"},{"key":"c","text":"wandale"},{"key":"d","text":"zdobywcy"}],"correct":["a"],"answer":"a) szpiedzy"},{"id":65,"question":"Do czego służy biometria?","type":"closed","options":[{"key":"a","text":"uwierzytelniania"},{"key":"b","text":"rozliczania"},{"key":"c","text":"kontroli obecności"},{"key":"d","text":"badań lekarskich"}],"correct":["a"],"answer":"a) uwierzytelniania"},{"id":66,"question":"Wadą filtrowania pakietów jest:","type":"closed","options":[{"key":"a","text":"możliwość fałszowania adresów IP"},{"key":"b","text":"utrata informacji przez użytkownika"},{"key":"c","text":"przeźroczystość dla użytkownika"},{"key":"d","text":"ograniczona liczba reguł"}],"correct":["a"],"answer":"a) możliwość fałszowania adresów IP"},{"id":67,"question":"Które z poniższych określeń najlepiej opisuje hasło identyczne przy każdym logowaniu?","type":"closed","options":[{"key":"a","text":"hasło statyczne"},{"key":"b","text":"hasło dynamiczne"},{"key":"c","text":"klucz jednorazowy"},{"key":"d","text":"umówione zdanie"}],"correct":["a"],"answer":"a) hasło statyczne"},{"id":68,"question":"Co to jest bastion host?","type":"closed","options":[{"key":"a","text":"pierwsza linia obrony sieci"},{"key":"b","text":"druga linia obrony sieci"},{"key":"c","text":"ostatnia linia obrony sieci"},{"key":"d","text":"zapora ogniowa firmy Milky Way"}],"correct":["a"],"answer":"a) pierwsza linia obrony sieci"},{"id":69,"question":"Kto używa skanerów?","type":"closed","options":[{"key":"a","text":"intruzi"},{"key":"b","text":"użytkownicy"},{"key":"c","text":"dostawcy usług internetowych"},{"key":"d","text":"dostawcy aplikacji"}],"correct":["a"],"answer":"a) intruzi"},{"id":70,"question":"Co oznacza skrót „DMZ\"?","type":"closed","options":[{"key":"a","text":"Demilitarization Zone"},{"key":"b","text":"Demounted Zone"},{"key":"c","text":"Domain Main Zone"},{"key":"d","text":"Domain Martime Zone"}],"correct":["a"],"answer":"a) Demilitarization Zone [wśród opcji brak dokładnej formy; poprawne rozwinięcie skrótu DMZ to: Demilitarized Zone.]"},{"id":71,"question":"Jakie są funkcje firewalla stacji roboczej (host-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Ochrona pojedynczego hosta: komputera, laptopa lub serwera.\n- Kontrola ruchu przychodzącego i wychodzącego z tego konkretnego urządzenia.\n- Możliwość wiązania reguł z aplikacjami/procesami, portami, adresami IP i protokołami.\n- Rejestrowanie lub sygnalizowanie prób niedozwolonej komunikacji."},{"id":72,"question":"Jakie są zastosowania firewalla stacji roboczej (host-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Zabezpieczanie stacji roboczych i laptopów także poza siecią firmową, np. w sieciach publicznych.\n- Uzupełnienie firewalla sieciowego przez egzekwowanie zasad bezpośrednio na hoście.\n- Kontrola aplikacji próbujących nawiązywać połączenia przychodzące lub wychodzące.\n- Ograniczanie skutków infekcji lub błędnej konfiguracji przez blokowanie niepożądanej komunikacji."},{"id":73,"question":"Jakie zadanie realizuje firewall stacji roboczej (host-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Blokowanie nieautoryzowanego dostępu do urządzenia.\n- Filtrowanie ruchu według reguł dotyczących adresów IP, portów, protokołów i aplikacji.\n- Kontrola połączeń wychodzących, aby aplikacje nie wysyłały danych bez zgody użytkownika lub polityki bezpieczeństwa.\n- Ograniczanie komunikacji złośliwego oprogramowania, ale bez zastępowania programu antywirusowego/EDR.\n- Logowanie zdarzeń związanych z ruchem sieciowym hosta."},{"id":74,"question":"Jakie są funkcje firewalla sieciowego (network-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Ochrona całej sieci lub jej segmentów.\n- Kontrola ruchu sieciowego przechodzącego przez punkty graniczne sieci (np. między siecią wewnętrzną a Internetem).\n- Realizacja reguł filtrowania pakietów na poziomie sieciowym, w tym filtrowanie adresów IP, portów oraz protokołów."},{"id":75,"question":"Jakie są zastosowania firewalla sieciowego (network-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Zabezpieczenie infrastruktury sieciowej przed zewnętrznymi zagrożeniami.\n- Ochrona wielu urządzeń i serwerów w sieci.\n- Implementacja polityk bezpieczeństwa sieciowego, takich jak strefy DMZ (Demilitarized Zone)."},{"id":76,"question":"Jakie zadania realizuje firewall sieciowy (network-based firewall)?","type":"open","options":[],"correct":[],"answer":"- Blokowanie nieautoryzowanego dostępu do sieci lub jej segmentów.\n- Filtracja ruchu na poziomie sieciowym (L3) oraz na poziomie transportowym (L4).\n- Umożliwienie tworzenia i zarządzania strefami bezpieczeństwa (np. wewnętrzna sieć, strefa DMZ).\n- Przeprowadzanie inspekcji stanowej (stateful inspection), aby śledzić stan połączeń sieciowych i dopuszczać tylko prawidłowe pakiety.\n- Monitorowanie i raportowanie ruchu sieciowego w celu wykrywania i reagowania na incydenty bezpieczeństwa."},{"id":77,"question":"Napisz, jakiej cechy dotyczącej zaufania obecnej w PKI nie posiada SSH. Porównaj pozostałe cechy rozwiązań - podobieństwa i róznice (w formie punktów lub tabeli).","type":"open","options":[],"correct":[],"answer":"Cecha zaufania obecna w PKI, której typowo nie ma SSH:\n- PKI opiera się na zaufanej stronie trzeciej, czyli urzędzie certyfikacji CA, oraz na ścieżce certyfikacji prowadzącej do zaufanego korzenia.\n- Typowe SSH działa w modelu TOFU (Trust On First Use): przy pierwszym połączeniu użytkownik akceptuje klucz hosta, który później jest zapamiętywany lokalnie w known_hosts.\n\nPodobieństwa:\n- oba rozwiązania używają kryptografii asymetrycznej,\n- oba wykorzystują parę kluczy publiczny/prywatny,\n- oba mogą służyć do uwierzytelniania stron komunikacji,\n- w obu można porównywać odciski/fingerprint kluczy.\n\nRóżnice:\n- PKI używa certyfikatów, CA, łańcuchów zaufania, polityk certyfikacji oraz mechanizmów odwołania certyfikatów, np. CRL/OCSP,\n- SSH najczęściej używa lokalnie zapamiętanych kluczy hostów i nie wymaga globalnej hierarchii CA,\n- PKI lepiej skaluje się organizacyjnie w dużych środowiskach, a SSH jest prostsze i bardziej lokalne w zarządzaniu zaufaniem."},{"id":78,"question":"Jak działa Cross Certification w PKI?","type":"open","options":[],"correct":[],"answer":"Cross Certification polega na tym, że jeden urząd certyfikacji CA wystawia certyfikat innemu CA, często wzajemnie. Dzięki temu dwie wcześniej odrębne domeny PKI mogą zbudować między sobą ścieżkę zaufania. Użytkownik lub system ufający jednemu CA może wtedy, po poprawnej walidacji ścieżki certyfikatów, zaufać certyfikatom wystawionym w drugiej domenie. Zaufanie może być ograniczane politykami certyfikacji, ograniczeniami nazw, ograniczeniami długości ścieżki i zakresem zastosowań certyfikatów."},{"id":79,"question":"Opisz rolę monitorowania w zarządzaniu bezpieczeństwem sieci.","type":"open","options":[],"correct":[],"answer":"Monitorowanie w zarządzaniu bezpieczeństwem sieci służy stałej obserwacji działania usług, ruchu, urządzeń, konfiguracji i mechanizmów bezpieczeństwa. Pozwala wykrywać awarie, anomalie, incydenty, podatności, wąskie gardła i pojedyncze punkty awarii. Dostarcza danych do raportowania, reagowania na incydenty, weryfikacji SLA, planowania pojemności oraz oceny, czy sieć działa stabilnie, wydajnie i bezpiecznie. Powinno być prowadzone wielopłaszczyznowo, a nie tylko na poziomie samego ruchu sieciowego."},{"id":80,"question":"Zaznacz pole, jakiego nie zawiera certyfikat X.509 w wersji 1:","type":"closed","options":[{"key":"a","text":"Czasu ważności certyfikatu"},{"key":"b","text":"Opisu podmiotu w postaci np. nazwy FQDN"},{"key":"c","text":"Klucza publicznego podmiotu"},{"key":"d","text":"Rozszerzeń v3"}],"correct":["d"],"answer":"d) Rozszerzeń v3"},{"id":81,"question":"Otwarty model bezpieczeństwa zgodnie z normą ISO 27000:","type":"closed","options":[{"key":"a","text":"Zabrania wszystkiego, poza tym co zostało dozwolone"},{"key":"b","text":"Najczęściej dotyczy ruchu przychodzącego z sieci Internet w urządzeniach firewall"},{"key":"c","text":"Jest bardziej restrykcyjny niż model zamknięty"},{"key":"d","text":"Zezwala na wszystko poza tym, co zostało zabronione"}],"correct":["d"],"answer":"d) Zezwala na wszystko poza tym, co zostało zabronione"},{"id":82,"question":"Atak niecelowany użyciem malware charakteryzuje się:","type":"closed","options":[{"key":"a","text":"długą fazą rozpoznania"},{"key":"b","text":"małym ponownym wykorzystaniem kodu malware"},{"key":"c","text":"wykorzystaniem popularnych zachowań użytkowników"},{"key":"d","text":"małym zakresem liczby atakowanych środowisk"}],"correct":["c"],"answer":"c) wykorzystaniem popularnych zachowań użytkowników"},{"id":83,"question":"Zaznacz zdanie nieprawdziwe w kontekście ataków DoS/DDoS","type":"closed","options":[{"key":"a","text":"Ataki DDoS angażują rozproszone geograficznie miejsca, z których prowadzony jest atak"},{"key":"b","text":"Ataki DoS i DDoS godzą bardziej w użytkowników systemu niż w atakowany system"},{"key":"c","text":"Ataki DoS i DDoS skutkują odmową świadczenia usług"},{"key":"d","text":"Ataki DoS i DDoS wymagają kompromitacji haseł użytkowników"}],"correct":["d"],"answer":"d) Ataki DoS i DDoS wymagają kompromitacji haseł użytkowników"},{"id":84,"question":"Hasła współdzielone między różnymi systemami są zagrożeniem ponieważ","type":"closed","options":[{"key":"a","text":"wpływają bezpośrednio na dostępność systemów IT"},{"key":"b","text":"kompromitacja jednego systemu powoduje skompromitowanie pozostałych"},{"key":"c","text":"ktoś inny może mieć takie samo hasło"},{"key":"d","text":"powoduje wyższą podatność na atak brute-force (siłowy)"}],"correct":["b"],"answer":"b) kompromitacja jednego systemu powoduje skompromitowanie pozostałych"},{"id":85,"question":"Autentyczność, w rozumieniu funkcji bezpieczeństwa, pozwala na:","type":"closed","options":[{"key":"a","text":"zapobieganie możliwości sfałszowania danych"},{"key":"b","text":"przypisanie autorstwa przekazu"},{"key":"c","text":"zapewnienie poufności komunikujących się stron"},{"key":"d","text":"wykrywanie nie więcej niż dopuszczalna modyfikacji przekazu"}],"correct":["b"],"answer":"b) przypisanie autorstwa przekazu"},{"id":86,"question":"Porównanie architektur PKI i PGP prowadzi do wniosku:","type":"closed","options":[{"key":"a","text":"żadna odpowiedź nie jest prawidłowa"},{"key":"b","text":"PGP jest strukturą bardziej elastyczną w kształtowaniu relacji zaufania"},{"key":"c","text":"PKI jest strukturą bardziej elastyczną w kształtowaniu relacji zaufania"},{"key":"d","text":"PKI ma węższe zastosowanie"}],"correct":["b"],"answer":"b) PGP jest strukturą bardziej elastyczną w kształtowaniu relacji zaufania"},{"id":87,"question":"Scharakteryzuj relację zawierania PKI i PGP (które jest podzbiorem/nadzbiorem którego). Napisz, jakie cechy, których nie posiada PGP, posiada PKI.","type":"open","options":[],"correct":[],"answer":"- PGP nie jest prostym podzbiorem klasycznej hierarchicznej PKI X.509; to alternatywny, zdecentralizowany model zaufania oparty na Web of Trust.\n- W bardzo ogólnym sensie PGP realizuje część idei infrastruktury klucza publicznego, bo używa kluczy publicznych/prywatnych i wiąże klucze z tożsamością użytkownika, ale nie ma typowej hierarchii CA.\n\nCechy PKI, których typowo nie posiada PGP:\n- centralne lub hierarchiczne urzędy certyfikacji CA,\n- formalne role RA/VA i repozytoria certyfikatów,\n- certyfikaty X.509 oraz ścieżki certyfikacji do zaufanego root CA,\n- formalne polityki certyfikacji i procedury CP/CPS,\n- standardowe mechanizmy odwoływania i sprawdzania statusu certyfikatów, np. CRL/OCSP,\n- bardziej sformalizowane zarządzanie cyklem życia certyfikatów i większa interoperacyjność w systemach korporacyjnych."},{"id":88,"question":"TLS handshake — opisz etapy i ich znaczenie.","type":"open","options":[],"correct":[],"answer":"TLS handshake to etap zestawiania bezpiecznego kanału przed właściwą transmisją danych. Sensowny opis:\n- ClientHello: klient wysyła obsługiwane wersje TLS, zestawy szyfrów, losową wartość, rozszerzenia, np. SNI/ALPN, oraz dane do uzgodnienia klucza, np. key_share w TLS 1.3.\n- ServerHello: serwer wybiera parametry połączenia, np. wersję TLS i zestaw kryptograficzny, oraz przekazuje własne dane do uzgodnienia klucza.\n- Uwierzytelnienie serwera: serwer wysyła certyfikat, a klient sprawdza m.in. łańcuch zaufania, nazwę podmiotu/SAN, okres ważności, przeznaczenie certyfikatu i status odwołania, np. OCSP/CRL.\n- Uzgodnienie kluczy sesyjnych: strony na podstawie wymiany kluczy, zwykle ECDHE/DHE, wyliczają wspólny sekret i klucze sesyjne do szyfrowania oraz ochrony integralności.\n- Finished: obie strony potwierdzają, że handshake przebiegł poprawnie i nie został zmodyfikowany.\n- Application Data: po zakończeniu handshake dalsza komunikacja jest szyfrowana kluczami sesyjnymi.\n- Opcjonalnie: serwer może zażądać certyfikatu klienta, czyli mutual TLS, albo wysłać NewSessionTicket, który umożliwia późniejsze wznowienie sesji bez pełnego handshake."},{"id":89,"question":"Mechanizm TLS Session Tickets:","type":"closed","options":[{"key":"a","text":"umożliwia przyspieszenie zestawienia sesji TLS wykorzystując informacje o istniejącej sesji TLS przechowywane przez serwer."},{"key":"b","text":"wykorzystuje zaszyfrowaną paczkę danych na temat nawiązanej wcześniej sesji przechowywaną przez klienta."},{"key":"c","text":"stanowi dodatkowe zabezpieczenia przy zestawianiu nowych sesji TLS."},{"key":"d","text":"umożliwia klientowi bezpieczne przechowywanie klucza szyfrującego STEK."}],"correct":["b"],"answer":"b) wykorzystuje zaszyfrowaną paczkę danych na temat nawiązanej wcześniej sesji przechowywaną przez klienta.\nDoprecyzowanie:\nSerwer tworzy ticket zawierający dane potrzebne do wznowienia sesji, zabezpiecza go kluczem serwera, np. STEK, i wysyła klientowi. Klient przechowuje ticket i przy kolejnym połączeniu odsyła go serwerowi, dzięki czemu można wznowić sesję szybciej niż przy pełnym handshake. Klient nie przechowuje klucza STEK."},{"id":90,"question":"Wskaż zdanie fałszywe:","type":"closed","options":[{"key":"a","text":"Diameter korzysta z protokołu TCP."},{"key":"b","text":"Diameter często stosowany jest w środowiskach bezprzewodowych."},{"key":"c","text":"Diameter jest wstecznie kompatybilny z protokołem RADIUS."},{"key":"d","text":"W przeciwieństwie do RADIUSa, Diameter wspiera protokół SCTP."}],"correct":["c"],"answer":"c) Diameter jest wstecznie kompatybilny z protokołem RADIUS."},{"id":91,"question":"Który z poniższych łańcuchów nie występuje w tablicy filter modułu iptables:","type":"closed","options":[{"key":"a","text":"INPUT."},{"key":"b","text":"PREROUTING."},{"key":"c","text":"FORWARD."},{"key":"d","text":"OUTPUT."}],"correct":["b"],"answer":"b) PREROUTING.\nDoprecyzowanie:\nW tablicy filter standardowo występują łańcuchy INPUT, FORWARD i OUTPUT. PREROUTING występuje w innych tablicach, np. nat/mangle/raw, ale nie w filter."},{"id":92,"question":"Opisz różnice pomiędzy firewallem stacji roboczej a firewallem sieciowym — jakie są ich funkcje, zastosowanie i realizowane zadania.","type":"open","options":[],"correct":[],"answer":"Firewall stacji roboczej, czyli personal/host-based firewall:\n- działa bezpośrednio na pojedynczym hoście, np. komputerze, laptopie lub serwerze;\n- jest zwykle zintegrowany z systemem operacyjnym;\n- kontroluje ruch przychodzący i wychodzący dotyczący konkretnego urządzenia;\n- może wiązać reguły z aplikacjami/procesami, użytkownikiem, portami, protokołami i adresami;\n- chroni host także poza siecią firmową, np. w sieci publicznej;\n- ogranicza skutki infekcji lub błędnej konfiguracji przez blokowanie niepożądanej komunikacji wychodzącej.\n\nFirewall sieciowy, czyli network firewall:\n- działa jako fizyczne lub wirtualne urządzenie/punkt filtrujący w sieci;\n- kontroluje ruch przechodzący przez urządzenie, np. między LAN i WAN, między VLAN-ami albo między strefami bezpieczeństwa;\n- chroni całą sieć lub jej segmenty, a nie tylko jeden host;\n- egzekwuje centralną politykę bezpieczeństwa, np. reguły L3/L4, NAT, strefy DMZ, VPN, inspekcję stanową;\n- służy do separacji segmentów i ograniczania ruchu między zaufanymi oraz niezaufanymi obszarami;\n- umożliwia centralne logowanie, monitorowanie i reagowanie na zdarzenia sieciowe.\n\nNajkrócej: firewall stacji roboczej chroni pojedyncze urządzenie i często widzi kontekst aplikacji, a firewall sieciowy chroni przejścia między sieciami/strefami i egzekwuje politykę dla wielu urządzeń naraz."},{"id":93,"question":"Opisz, jak należy skonfigurować serwer Graylog, aby mógł przetwarzać wiadomości za pomocą rurociągu (Pipeline).","type":"open","options":[],"correct":[],"answer":"Aby Graylog przetwarzał wiadomości przez Pipeline, należy:\n- skonfigurować Input, czyli wejście odbierające logi, np. Syslog, GELF, Beats lub Raw/Plaintext, z właściwym protokołem i portem;\n- upewnić się, że wiadomości trafiają do odpowiedniego Streamu, np. przez reguły streamu lub domyślny stream;\n- utworzyć Pipeline w sekcji System/Pipelines;\n- dodać jeden lub więcej Stage, np. stage 0, stage 1, bo kolejność etapów wpływa na przetwarzanie;\n- utworzyć i przypisać Rules do etapów pipeline. Reguły mają zwykle postać warunku `when ... then ... end` i mogą np. parsować pola, zmieniać wartości, dodawać pola, usuwać wiadomości, wzbogacać dane przez lookup albo przekierowywać do innego streamu;\n- połączyć Pipeline ze Streamem w sekcji Pipeline connections;\n- przetestować działanie na przykładowych logach i sprawdzić, czy input, stream, pipeline i reguły są aktywne oraz wykonywane w dobrej kolejności.\n\nW skrócie: Input odbiera logi, Stream wybiera wiadomości, Pipeline z regułami je przetwarza, a połączenie Pipeline-Stream decyduje, do których wiadomości te reguły zostaną zastosowane."},{"id":94,"question":"Scharakteryzuj rozwiązania prywatnych sieci VLAN (Private VLAN), podaj znane typy, wskaż ich zastosowania i specyficzną funkcjonalność.","type":"open","options":[],"correct":[],"answer":"Private VLAN to mechanizm podziału jednej domeny rozgłoszeniowej VLAN na mniejsze, logicznie izolowane fragmenty. Pozwala ograniczyć komunikację między hostami znajdującymi się w tej samej adresacji i tym samym głównym VLAN-ie, bez konieczności tworzenia osobnych VLAN-ów oraz podsieci dla każdego hosta lub klienta.\n\nElementy i typy:\n- Primary VLAN — główny VLAN, w ramach którego istnieją pod-VLAN-y prywatne.\n- Secondary VLAN — VLAN podrzędny względem primary VLAN.\n- Isolated VLAN / isolated ports — porty izolowane nie komunikują się między sobą, ale mogą komunikować się z portem promiscuous, np. bramą/routerem/firewallem.\n- Community VLAN / community ports — porty w tej samej społeczności mogą komunikować się ze sobą oraz z portem promiscuous, ale nie z innymi community ani z portami isolated.\n- Promiscuous port — port uprzywilejowany, zwykle prowadzący do bramy domyślnej, routera, firewalla lub usługi wspólnej; może komunikować się z portami isolated i community.\n\nZastosowania:\n- sieci hostingowe, data center, środowiska wielu klientów i środowiska z wieloma maszynami w jednej podsieci;\n- izolacja hostów lub klientów przy zachowaniu wspólnej bramy domyślnej;\n- ograniczenie ruchu lateralnego i ataków między hostami w tym samym VLAN-ie;\n- DMZ, sieci gościnne, segmenty z urządzeniami, które powinny mieć dostęp do bramy/usługi centralnej, ale nie do siebie nawzajem.\n\nSpecyficzna funkcjonalność:\nPrivate VLAN ogranicza komunikację na warstwie 2 wewnątrz tej samej domeny rozgłoszeniowej. Dzięki temu można zmniejszyć liczbę potrzebnych VLAN-ów i podsieci, a jednocześnie zwiększyć izolację hostów."}]</script>

  <script>
    const QUESTIONS = JSON.parse(document.getElementById('questions-data').textContent);
    const TEST_VERSION = 'pytania-5-full-94-v2-modes';
    const STORAGE_KEY = 'github-pages-tester:' + TEST_VERSION;
    const TEST_MODES = {
      all: 'wszystkie',
      closed: 'zamknięte',
      open: 'otwarte'
    };
    const DEFAULT_MODE = 'all';

    const byId = new Map(QUESTIONS.map(q => [q.id, q]));

    let state = loadState();

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function normalizeMode(mode) {
      return Object.prototype.hasOwnProperty.call(TEST_MODES, mode) ? mode : DEFAULT_MODE;
    }

    function questionsForMode(mode) {
      const normalized = normalizeMode(mode);
      if (normalized === 'all') return QUESTIONS;
      return QUESTIONS.filter(q => q.type === normalized);
    }

    function questionIdsForMode(mode) {
      return questionsForMode(mode).map(q => q.id);
    }

    function modeLabel(mode) {
      return TEST_MODES[normalizeMode(mode)];
    }

    function syncModeSelect() {
      const selector = document.getElementById('filterMode');
      if (selector) selector.value = normalizeMode(state.filterMode);
    }

    function newState(filterMode = DEFAULT_MODE) {
      const normalizedMode = normalizeMode(filterMode);
      return {
        version: TEST_VERSION,
        filterMode: normalizedMode,
        round: 1,
        queue: shuffle(questionIdsForMode(normalizedMode)),
        index: 0,
        mastered: [],
        review: [],
        roundWrong: [],
        answeredCurrent: false,
        lastFeedback: null
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return newState();
        const saved = JSON.parse(raw);
        if (!saved || saved.version !== TEST_VERSION) return newState();

        saved.filterMode = normalizeMode(saved.filterMode);
        const validIds = new Set(questionIdsForMode(saved.filterMode));
        saved.queue = (saved.queue || []).filter(id => validIds.has(id));
        saved.mastered = [...new Set((saved.mastered || []).filter(id => validIds.has(id)))];
        saved.review = [...new Set((saved.review || []).filter(id => validIds.has(id)))];
        saved.roundWrong = [...new Set((saved.roundWrong || []).filter(id => validIds.has(id)))];
        saved.index = Math.max(0, Math.min(saved.index || 0, saved.queue.length));
        saved.round = saved.round || 1;
        saved.answeredCurrent = false;
        saved.lastFeedback = null;

        if (!saved.queue.length && saved.mastered.length !== validIds.size) return newState(saved.filterMode);
        return saved;
      } catch (e) {
        return newState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function resetTest() {
      if (!confirm('Zresetować cały test i zacząć od nowa?')) return;
      const currentMode = normalizeMode(state.filterMode);
      localStorage.removeItem(STORAGE_KEY);
      state = newState(currentMode);
      saveState();
      render();
    }

    function changeMode(nextMode) {
      const previousMode = normalizeMode(state.filterMode);
      const normalizedNextMode = normalizeMode(nextMode);
      if (normalizedNextMode === previousMode) return;

      if (!confirm('Zmiana trybu zresetuje postępy. Kontynuować?')) {
        syncModeSelect();
        return;
      }

      localStorage.removeItem(STORAGE_KEY);
      state = newState(normalizedNextMode);
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function currentQuestion() {
      return byId.get(state.queue[state.index]);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function optionLabel(option) {
      return '<span class="letter">' + escapeHtml(option.key) + '</span>' + escapeHtml(option.text);
    }

    function render() {
      const app = document.getElementById('app');
      syncModeSelect();
      updateStats();

      if (state.index >= state.queue.length) {
        renderRoundEnd();
        return;
      }

      const q = currentQuestion();
      document.getElementById('round').textContent = state.round;
      document.getElementById('position').textContent = `${state.index + 1}/${state.queue.length}`;
      document.getElementById('mode').textContent = modeLabel(state.filterMode);

      if (q.type === 'open') {
        renderOpenQuestion(q);
      } else {
        renderClosedQuestion(q);
      }
    }

    function renderQuestionHeader(q) {
      return `
        <div class="question-number">Pytanie #${q.id}</div>
        <h2 class="question">${escapeHtml(q.question)}</h2>
      `;
    }

    function renderClosedQuestion(q) {
      const app = document.getElementById('app');
      const shuffledOptions = shuffle(q.options);
      const isMulti = q.correct.length > 1;

      if (isMulti) {
        app.innerHTML = renderQuestionHeader(q) + `
          <p class="hint">To pytanie ma więcej niż jedną poprawną odpowiedź. Zaznacz wszystkie poprawne opcje i kliknij „Sprawdź”.</p>
          <div class="answers">
            ${shuffledOptions.map(o => `
              <label class="choice-row">
                <input type="checkbox" name="multi" value="${escapeHtml(o.key)}">
                <span>${optionLabel(o)}</span>
              </label>
            `).join('')}
          </div>
          <div class="actions">
            <button type="button" id="checkMulti">Sprawdź</button>
          </div>
          <div id="feedback"></div>
        `;

        document.getElementById('checkMulti').addEventListener('click', () => {
          const picked = [...document.querySelectorAll('input[name="multi"]:checked')].map(el => el.value).sort();
          const correct = [...q.correct].sort();
          const ok = picked.length === correct.length && picked.every((v, i) => v === correct[i]);
          showClosedFeedback(q, ok, picked);
        });
        return;
      }

      app.innerHTML = renderQuestionHeader(q) + `
        <div class="answers">
          ${shuffledOptions.map(o => `
            <button class="full" type="button" data-answer="${escapeHtml(o.key)}">${optionLabel(o)}</button>
          `).join('')}
        </div>
        <div id="feedback"></div>
      `;

      document.querySelectorAll('[data-answer]').forEach(btn => {
        btn.addEventListener('click', () => {
          const picked = btn.getAttribute('data-answer');
          const ok = q.correct.includes(picked);
          showClosedFeedback(q, ok, [picked]);
        });
      });
    }

    function showClosedFeedback(q, ok, picked) {
      if (state.answeredCurrent) return;
      state.answeredCurrent = true;
      classifyAnswer(q.id, ok);

      const correctText = q.correct
        .map(key => q.options.find(o => o.key === key))
        .filter(Boolean)
        .map(o => `<div>${optionLabel(o)}</div>`)
        .join('');

      const pickedText = picked.length ? picked.map(k => k.toUpperCase()).join(', ') : 'brak';
      const box = document.getElementById('feedback');
      box.innerHTML = `
        <div class="feedback ${ok ? 'good-border' : 'bad-border'}">
          <strong>${ok ? 'Dobrze ✅' : 'Źle ❌'}</strong>
          <div style="margin-top:8px">Twoja odpowiedź: <strong>${escapeHtml(pickedText)}</strong></div>
          <div style="margin-top:8px">Poprawna odpowiedź:</div>
          <div class="definition">${correctText || escapeHtml(q.answer)}</div>
          <div class="actions">
            <button type="button" id="nextQuestion">Następne pytanie</button>
          </div>
        </div>
      `;

      document.querySelectorAll('[data-answer], #checkMulti').forEach(el => el.disabled = true);
      document.getElementById('nextQuestion').addEventListener('click', nextQuestion);
      updateStats();
      saveState();
    }

    function renderOpenQuestion(q) {
      const app = document.getElementById('app');
      app.innerHTML = renderQuestionHeader(q) + `
        <p class="hint">Spróbuj odpowiedzieć samodzielnie. Potem odkryj definicję i oceń, czy umiesz.</p>
        <div class="actions">
          <button type="button" id="showAnswer">Pokaż odpowiedź / definicję</button>
        </div>
        <div id="openAnswer"></div>
      `;

      document.getElementById('showAnswer').addEventListener('click', () => {
        document.getElementById('openAnswer').innerHTML = `
          <div class="definition">${escapeHtml(q.answer)}</div>
          <div class="actions">
            <button type="button" class="bad" id="dontKnow">Nie umiem</button>
            <button type="button" class="good" id="know">Umiem</button>
          </div>
        `;
        document.getElementById('showAnswer').disabled = true;
        document.getElementById('dontKnow').addEventListener('click', () => markOpen(q.id, false));
        document.getElementById('know').addEventListener('click', () => markOpen(q.id, true));
      });
    }

    function markOpen(id, ok) {
      if (state.answeredCurrent) return;
      state.answeredCurrent = true;
      classifyAnswer(id, ok);

      const box = document.getElementById('openAnswer');
      box.insertAdjacentHTML('beforeend', `
        <div class="feedback ${ok ? 'good-border' : 'bad-border'}">
          <strong>${ok ? 'Oznaczone jako „Umiem” ✅' : 'Oznaczone jako „Nie umiem” ❌'}</strong>
          <div class="actions">
            <button type="button" id="nextQuestion">Następne pytanie</button>
          </div>
        </div>
      `);
      document.getElementById('dontKnow').disabled = true;
      document.getElementById('know').disabled = true;
      document.getElementById('nextQuestion').addEventListener('click', nextQuestion);
      updateStats();
      saveState();
    }

    function classifyAnswer(id, ok) {
      const mastered = new Set(state.mastered);
      const review = new Set(state.review);
      const roundWrong = new Set(state.roundWrong);

      if (ok) {
        mastered.add(id);
        review.delete(id);
        roundWrong.delete(id);
      } else {
        review.add(id);
        mastered.delete(id);
        roundWrong.add(id);
      }

      state.mastered = [...mastered];
      state.review = [...review];
      state.roundWrong = [...roundWrong];
    }

    function nextQuestion() {
      state.index += 1;
      state.answeredCurrent = false;
      state.lastFeedback = null;
      saveState();
      render();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderRoundEnd() {
      const app = document.getElementById('app');
      document.getElementById('round').textContent = state.round;
      document.getElementById('position').textContent = `${state.queue.length}/${state.queue.length}`;
      document.getElementById('mode').textContent = modeLabel(state.filterMode);

      if (state.roundWrong.length > 0) {
        app.innerHTML = `
          <div class="done">
            <div class="emoji">🔁</div>
            <h2>Koniec rundy ${state.round}</h2>
            <p class="hint">W następnej rundzie pojawią się tylko pytania, na które odpowiedź była błędna albo oznaczona jako „Nie umiem”.</p>
            <div class="stats" style="max-width:440px;margin:20px auto">
              <div class="stat"><span class="num">${state.queue.length - state.roundWrong.length}</span><span class="label">dobrze w rundzie</span></div>
              <div class="stat"><span class="num">${state.roundWrong.length}</span><span class="label">do powtórki</span></div>
            </div>
            <button type="button" id="nextRound">Start kolejnej rundy</button>
          </div>
        `;
        document.getElementById('nextRound').addEventListener('click', () => {
          state.round += 1;
          state.queue = shuffle(state.roundWrong);
          state.index = 0;
          state.roundWrong = [];
          state.answeredCurrent = false;
          saveState();
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      } else {
        app.innerHTML = `
          <div class="done">
            <div class="emoji">🎉</div>
            <h2>Wszystko opanowane</h2>
            <p class="hint">Nie ma już pytań w kupce „Do powtórki”. Możesz zresetować test i przejść cały zestaw ponownie w nowej losowej kolejności.</p>
            <button type="button" id="restartAll">Zacznij od nowa</button>
          </div>
        `;
        document.getElementById('restartAll').addEventListener('click', () => {
          const currentMode = normalizeMode(state.filterMode);
          localStorage.removeItem(STORAGE_KEY);
          state = newState(currentMode);
          saveState();
          render();
        });
      }

      updateStats();
      saveState();
    }

    function updateStats() {
      const validIds = new Set(questionIdsForMode(state.filterMode));
      const total = validIds.size;
      const mastered = new Set((state.mastered || []).filter(id => validIds.has(id)));
      const review = new Set((state.review || []).filter(id => validIds.has(id)));
      const left = Math.max(0, (state.queue || []).length - (state.index || 0));

      document.getElementById('masteredCount').textContent = mastered.size;
      document.getElementById('reviewCount').textContent = review.size;
      document.getElementById('leftCount').textContent = left;
      document.getElementById('totalCount').textContent = total;

      const answeredEver = new Set([...mastered, ...review]).size;
      const pct = total ? Math.round((answeredEver / total) * 100) : 0;
      document.getElementById('progressBar').style.width = pct + '%';

      renderMiniList('reviewList', [...review]);
      renderMiniList('masteredList', [...mastered]);
    }

    function renderMiniList(id, ids) {
      const target = document.getElementById(id);
      if (!target) return;

      if (!ids.length) {
        target.innerHTML = '<p class="empty">Pusto.</p>';
        return;
      }

      target.innerHTML = ids
        .sort((a, b) => a - b)
        .map(qid => {
          const q = byId.get(qid);
          const title = q ? q.question : 'Pytanie';
          return `<li>#${qid} — ${escapeHtml(title.length > 92 ? title.slice(0, 92) + '…' : title)}</li>`;
        })
        .join('');
    }

    document.getElementById('filterMode').addEventListener('change', event => changeMode(event.target.value));
    document.getElementById('resetBtn').addEventListener('click', resetTest);
    document.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        const next = document.getElementById('nextQuestion');
        if (next) next.click();
      }
    });

    render();
  </script>
</body>
</html>
